      +                api_base_url: apiBaseUrl,
      +                avatar_id: avatarId,
      +                agora_uid: agoraUid,
      +                ...(agoraAppId && { agora_appid: agoraAppId }),
      +                ...(agoraChannel && { agora_channel: agoraChannel }),
      +                ...(agoraToken && { agora_token: agoraToken }),
      +            },
      +        };
      +    }
      +}
