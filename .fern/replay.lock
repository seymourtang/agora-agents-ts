        // =============================================================================
        // TTS Vendor-Specific Types (re-exports for convenience)
        // =============================================================================

        export type MicrosoftTts = MicrosoftTtsType;
        export type MicrosoftTtsParams = MicrosoftTtsParamsType;
        export type ElevenLabsTts = ElevenLabsTtsType;
