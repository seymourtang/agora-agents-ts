      .github/workflows/release.yml: |
        name: npm release

        on:
          push:
            tags:
              - "v*"
          workflow_dispatch:
            inputs:
              tag:
                description: "Existing tag to release, for example v1.4.0"
                required: true
                type: string

        permissions:
          contents: read
          id-token: write

        jobs:
          publish:
            runs-on: ubuntu-latest
            env:
              RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4
                with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

              - name: Set up node
                uses: actions/setup-node@v4
                with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Build
                run: pnpm build

              - name: Test
                run: pnpm test:unit

              - name: Verify release tag
                run: |
                  TAG="${RELEASE_TAG}"
                  git rev-parse "$TAG" >/dev/null

              - name: Verify package versions match release tag
                run: |
                  TAG_VERSION="${RELEASE_TAG#v}"
                  ROOT_VERSION="$(node -p "require('./package.json').version")"
                  COMPAT_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').version")"
                  COMPAT_DEP_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').dependencies['agora-agents']")"

                  if [ "$ROOT_VERSION" != "$TAG_VERSION" ]; then
                    echo "Root package version ($ROOT_VERSION) does not match tag version ($TAG_VERSION)."
                    exit 1
                  fi

                  if [ "$COMPAT_VERSION" != "$TAG_VERSION" ]; then
                    echo "Compat package version ($COMPAT_VERSION) does not match tag version ($TAG_VERSION)."
                    exit 1
                  fi

                  if [ "$COMPAT_DEP_VERSION" != "^$TAG_VERSION" ]; then
                    echo "Compat package dependency on agora-agents ($COMPAT_DEP_VERSION) does not match ^$TAG_VERSION."
                    exit 1
                  fi

              - name: Publish primary package to npm
                run: |
                  PACKAGE_NAME="$(node -p "require('./package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
                    exit 0
                  fi

                  npm publish --access public
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

              - name: Publish compatibility shim to npm
                run: |
                  PACKAGE_NAME="$(node -p "require('./compat/agora-agent-server-sdk/package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').version")"

                  if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
                    exit 0
                  fi

                  cd compat/agora-agent-server-sdk
                  npm publish --access public
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

              - name: Deprecate legacy package name
                run: |
                  npm deprecate "agora-agent-server-sdk@<${RELEASE_TAG#v}" "This package has been renamed to agora-agents. Please install agora-agents instead." || true
                  npm deprecate "agora-agent-server-sdk@${RELEASE_TAG#v}" "This package has been renamed to agora-agents. Please install agora-agents instead."
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      compat/agora-agent-server-sdk/README.md: |
        # agora-agent-server-sdk

        This package has been renamed to `agora-agents`.

        New projects should install:

        ```sh
        npm install agora-agents
        ```

        This compatibility package re-exports the public API from `agora-agents` to support existing installs during the migration window.
      compat/agora-agent-server-sdk/index.d.ts: |
        export * from "agora-agents";
      compat/agora-agent-server-sdk/index.js: |
        "use strict";

        module.exports = require("agora-agents");
      compat/agora-agent-server-sdk/index.mjs: |
        export * from "agora-agents";
      compat/agora-agent-server-sdk/package.json: |
        {
            "name": "agora-agent-server-sdk",
            "version": "2.0.0",
            "private": false,
            "description": "Compatibility shim for the renamed agora-agents package.",
            "repository": "github:AgoraIO-Conversational-AI/agora-agents-ts",
            "license": "MIT",
            "main": "./index.js",
            "module": "./index.mjs",
            "types": "./index.d.ts",
            "exports": {
                ".": {
                    "types": "./index.d.ts",
                    "import": "./index.mjs",
                    "require": "./index.js",
                    "default": "./index.js"
                },
                "./package.json": "./package.json"
            },
            "files": [
                "index.js",
                "index.mjs",
                "index.d.ts",
                "README.md"
            ],
            "sideEffects": false,
            "dependencies": {
                "agora-agents": "^2.0.0"
