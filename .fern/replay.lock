        title: Agent Builder Features
        description: Configure SAL, advanced features, parameters, geofence, labels, RTC, filler words, and more.
        ---

        # Agent Builder Features

        The Agent builder supports many configuration options beyond the core LLM, TTS, and STT vendors. This guide shows how to use each feature.

        ## Overview

        | Feature | Method | Description |
        |---|---|---|
        | `sal` | `withSal(config)` | Selective Attention Locking — speaker recognition and noise suppression |
        | `advancedFeatures` | `withAdvancedFeatures(features)` | Enable MLLM, RTM, SAL, tools |
        | `tools` | `withTools(enabled)` | Enable MCP tool invocation |
        | `parameters` | `withParameters(params)` | Silence config, farewell config, data channel |
        | `failureMessage` | LLM/MLLM vendor option | Message spoken when LLM fails |
        | `maxHistory` | LLM vendor option | Max conversation turns in LLM context |
        | `geofence` | `withGeofence(config)` | Restrict backend server regions |
        | `labels` | `withLabels(labels)` | Custom key-value labels (returned in callbacks) |
        | `rtc` | `withRtc(config)` | RTC media encryption |
        | `fillerWords` | `withFillerWords(config)` | Filler words while waiting for LLM |

        ## SAL (Selective Attention Locking)

        SAL helps the agent focus on the primary speaker and suppress background noise. Enable it via `advancedFeatures` and configure with `withSal`:

        ```typescript
        import {
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
        } from 'agora-agents';

        const agent = new Agent({
          name: 'sal-assistant',
        })
          .withLlm(new OpenAI({
            apiKey: 'your-key',
            model: 'gpt-4o-mini',
            systemMessages: [{ role: 'system', content: 'You are a helpful assistant.' }],
          }))
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-key', model: 'nova-2', language: 'en-US' }))
          .withAdvancedFeatures({ enable_sal: true })
          .withSal({
            sal_mode: 'locking',
            sample_urls: { 'primary-speaker': 'https://example.com/voiceprint.pcm' },
          });
        ```

        `sal_mode` can be `'locking'` (speaker lock) or `'recognition'` (voiceprint recognition).

        ## Advanced Features

        Enable MLLM, RTM, SAL, or tools:

        ```typescript
        import { Agent } from 'agora-agents';

        // MLLM mode (see mllm-flow guide) — withMllm() enables it automatically
        const mllmAgent = new Agent()
          .withMllm(/* ... */);

        // RTM signaling for custom data delivery
        const rtmAgent = new Agent()
          .withAdvancedFeatures({ enable_rtm: true });

        // Enable tool invocation via MCP
        const toolsAgent = new Agent()
          .withTools();
        ```

        ## Session Parameters

        Configure silence handling, farewell behavior, and data channel:

        ```typescript
        import { Agent } from 'agora-agents';

        const agent = new Agent({ name: 'params-agent' })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */)
          .withParameters({
            silence_config: {
              timeout_ms: 10000,
              action: 'speak',
              content: 'I\'m still here. Take your time.',
            },
            farewell_config: {
              graceful_enabled: true,
              graceful_timeout_seconds: 10,
            },
            data_channel: 'rtm', // or 'datastream'
          });
        ```

        ## Failure Message and Max History

        ```typescript
        const agent2 = new Agent()
          .withLlm(new OpenAI({
            apiKey: 'your-key',
            model: 'gpt-4o-mini',
            failureMessage: 'Something went wrong.',
            maxHistory: 15,
          }))
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## Geofence

        Restrict which geographic regions the backend can use:

        ```typescript
        const agent = new Agent()
          .withGeofence({
            area: 'NORTH_AMERICA',
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);

        // Global with exclusion
        const agent2 = new Agent()
          .withGeofence({
            area: 'GLOBAL',
            exclude_area: 'EUROPE',
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        Valid `area` values: `'GLOBAL'`, `'NORTH_AMERICA'`, `'EUROPE'`, `'ASIA'`, `'INDIA'`, `'JAPAN'`.

        ## Labels

        Attach custom labels returned in notification callbacks:

        ```typescript
        const agent = new Agent()
          .withLabels({
            environment: 'production',
            team: 'support',
            version: '1.2.0',
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## RTC Encryption

        Configure RTC media encryption:

        ```typescript
        const agent = new Agent()
          .withRtc({
            encryption_key: 'your-32-byte-key',
            encryption_mode: 5, // AES_128_GCM
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## Filler Words

        Play filler words while waiting for the LLM response:

        ```typescript
        const agent = new Agent()
          .withFillerWords({
            enable: true,
            trigger: {
              mode: 'fixed_time',
              fixed_time_config: { response_wait_ms: 2000 },
            },
            content: {
              mode: 'static',
              static_config: {
                phrases: ['Let me think...', 'One moment...', 'Hmm...'],
                selection_rule: 'shuffle',
              },
            },
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## Getters

        Read back configuration via getter properties:

        ```typescript
        const agent = new Agent()
          .withGeofence({ area: 'EUROPE' })
          .withLabels({ env: 'staging' });

        agent.name;           // string | undefined
        agent.geofence;       // { area: 'NORTH_AMERICA' }
        agent.labels;         // { env: 'staging' }
        agent.sal;            // SalConfig | undefined
        agent.advancedFeatures;
        agent.parameters;
        agent.failureMessage;
        agent.rtc;
        agent.fillerWords;
        agent.config;         // Full read-only snapshot
        ```

        ## Chaining All Features

        ```typescript
        import {
          Agent,
          AgoraClient,
          Area,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
        } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'full-featured-assistant' })
          .withLlm(new OpenAI({
            apiKey: 'your-key',
            model: 'gpt-4o-mini',
            systemMessages: [{ role: 'system', content: 'You are a helpful voice assistant.' }],
            greetingMessage: 'Hello! How can I help?',
            failureMessage: 'Sorry, I had trouble processing that.',
            maxHistory: 20,
          }))
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-key', model: 'nova-2', language: 'en-US' }))
          .withAdvancedFeatures({ enable_rtm: true })
          .withParameters({
            silence_config: { timeout_ms: 8000, action: 'speak', content: 'I\'m listening.' },
            farewell_config: { graceful_enabled: true, graceful_timeout_seconds: 5 },
          })
          .withGeofence({ area: 'NORTH_AMERICA' })
          .withLabels({ app: 'voice-assistant', version: '2.0' })
          .withFillerWords({
            enable: true,
            trigger: { mode: 'fixed_time', fixed_time_config: { response_wait_ms: 1500 } },
            content: {
              mode: 'static',
              static_config: {
                phrases: ['Let me think...', 'One moment please.'],
                selection_rule: 'shuffle',
              },
            },
          });

        const session = agent.createSession(client, {
          channel: 'demo-room',
          agentUid: '1',
          remoteUids: ['100'],
          idleTimeout: 120,
        });

        const agentId = await session.start();
        ```

        ## Next steps

        - [Agent Reference](../reference/agent.md) — full API signatures
        - [Cascading Flow](./cascading-flow.md) — ASR → LLM → TTS setup
        - [MLLM Flow](./mllm-flow.md) — end-to-end audio with OpenAI Realtime, Gemini Live, Vertex AI, or xAI Grok
        - [Regional Routing](./regional-routing.md) — client area and geofence
      docs/guides/avatars.md: |
        ---
        sidebar_position: 3
        title: Avatar Integration
        description: Add a digital avatar to your Conversational AI agent.
        ---

        # Avatar Integration

        Avatars attach a visual representation to the agent's audio output.

        | Avatar | Provider | Required TTS sample rate |
        |---|---|---|
        | `LiveAvatarAvatar` | LiveAvatar (formerly HeyGen) | **24,000 Hz** |
        | `HeyGenAvatar` | Deprecated HeyGen alias | **24,000 Hz** |
        | `AkoolAvatar` | Akool | **16,000 Hz** |
        | `AnamAvatar` | Anam | Consult provider docs |
        | `GenericAvatar` | Custom avatar provider | Consult provider docs |

        ## Avatars require the cascading pipeline

        Avatars currently only work with the cascading **ASR + LLM + TTS** pipeline. They are **not** supported with MLLM (`OpenAIRealtime`, `GeminiLive`, `VertexAI`, `XaiGrok`). AgentKit rejects the combination at `Agent.toProperties()` and at `AgentSession.start()` so you see a clear error before the request reaches the backend:

        ```
        Avatars are only supported with the cascading ASR + LLM + TTS pipeline.
        Remove the avatar configuration when using MLLM, or switch to a cascading session.
        ```

        If you need an MLLM session, omit the avatar; if you need an avatar, use the cascading pipeline.

        ## Avatar tokens

        The agent and the avatar publish with separate RTC identities:

        | Identity | Field | UID |
        |---|---|---|
        | Agent audio pipeline | `properties.token` | `agent_rtc_uid` |
        | Avatar video publisher | `avatar.params.agora_token` | `avatar.params.agora_uid` |

        AgentKit auto-fills `agora_token` for avatar vendors that publish a separate RTC video identity:

        - `LiveAvatarAvatar` (and the deprecated `HeyGenAvatar` alias)
        - `GenericAvatar`

        For `AkoolAvatar` and `AnamAvatar`, the avatar provider handles publishing on its own and AgentKit never injects an `agora_token`. Use `isAvatarTokenManaged(avatar)` to check whether a config falls into the managed group.

        When `agoraToken` is omitted on a managed vendor, AgentKit generates it at `session.start()` from the session App ID, channel, app certificate, and avatar `agoraUid`. The generated token uses the same ConvoAI token format as the agent token, but is scoped to the avatar `agoraUid`. AgentKit never overwrites a user-provided avatar token.

        Keep `agoraUid` unique from `agentUid`. AgentKit warns when they match (managed vendors only).

        ## The sample-rate constraint

        Avatars require the TTS audio to be at a specific sample rate. If you use the wrong rate, the avatar will not render correctly. The SDK enforces this in two ways:

        ### 1. Compile-time enforcement (TypeScript phantom types)

        The `Agent` class tracks the TTS sample rate as a type parameter. When you call `.withAvatar()`, TypeScript checks that the TTS sample rate type matches the avatar's required rate. If they don't match, you get a compile error:

        ```typescript
        import { Agent, ElevenLabsTTS, HeyGenAvatar } from 'agora-agents';

        // This works — ElevenLabs at 24kHz matches HeyGen's requirement
        const good = new Agent({ name: 'avatar-agent' })
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withAvatar(new HeyGenAvatar({ apiKey: 'your-heygen-key', quality: 'high', agoraUid: '12345' }));

        // This fails at compile time — 16kHz does not match HeyGen's required 24kHz
        const bad = new Agent({ name: 'avatar-agent' })
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 16000 }))
          .withAvatar(new HeyGenAvatar({ apiKey: 'your-heygen-key', quality: 'high', agoraUid: '12345' }));
          //         ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
          // TypeScript error: 'this' context of type 'Agent<16000>' is not assignable to
          // method's 'this' of type 'Agent<24000>'
        ```

        ### 2. Runtime enforcement

        If phantom types are bypassed (for example, when config comes from external data), `session.start()` validates the TTS sample rate against the avatar vendor before sending the API request:

        ```
        Error: HeyGen avatars ONLY support 24,000 Hz sample rate. Your TTS is configured
        with 16000 Hz. Please update your TTS configuration to use 24kHz sample rate.
        See: https://docs.agora.io/en/conversational-ai/models/avatar/heygen
        ```

        For Akool:

        ```
        Error: Akool avatars ONLY support 16,000 Hz sample rate. Your TTS is configured
        with 24000 Hz. Please update your TTS configuration to use 16kHz sample rate.
        See: https://docs.agora.io/en/conversational-ai/models/avatar/akool
        ```

        ## Example: LiveAvatar with auto-generated avatar token

        ```typescript
        import {
          AgoraClient,
          Area,
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
          LiveAvatarAvatar,
        } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'liveavatar-agent' })
          .withLlm(new OpenAI({
            apiKey: 'your-openai-key',
            model: 'gpt-4o-mini',
            systemMessages: [{ role: 'system', content: 'You are a friendly avatar assistant.' }],
          }))
          .withTts(new ElevenLabsTTS({
            key: 'your-elevenlabs-key',
            modelId: 'eleven_flash_v2_5',
            voiceId: 'your-voice-id',
            sampleRate: 24000,  // Required for LiveAvatar
          }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }))
          .withAvatar(new LiveAvatarAvatar({
            apiKey: 'your-liveavatar-key',
            quality: 'high',
            agoraUid: '200', // unique avatar video UID
            avatarId: 'your-avatar-id',
            // agoraToken omitted: AgentKit generates it at session.start()
          }));

        const session = agent.createSession(client, {
          channel: 'avatar-room',
          agentUid: '1', // distinct from avatar agoraUid
          remoteUids: ['100'],
        });

        await session.start();
        ```

        ## Example: Generic avatar

        ```typescript
        import { Agent, GenericAvatar, OpenAI, OpenAITTS, AresSTT } from 'agora-agents';

        const agent = new Agent({ name: 'generic-avatar-agent' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new OpenAITTS({ apiKey: 'your-openai-tts-key', model: 'tts-1', voice: 'alloy' }))
          .withStt(new AresSTT())
          .withAvatar(new GenericAvatar({
            apiKey: 'your-avatar-provider-key',
            apiBaseUrl: 'https://avatar-provider.example.com',
            avatarId: 'avatar-id',
            agoraUid: '200',
            // agoraAppId, agoraChannel, and agoraToken are filled from the session.
          }));
        ```

        ## Example: Akool avatar with ElevenLabs at 16kHz

        ```typescript
        import {
          AgoraClient,
          Area,
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
          AkoolAvatar,
        } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'akool-agent' })
          .withLlm(new OpenAI({
            apiKey: 'your-openai-key',
            model: 'gpt-4o-mini',
            systemMessages: [{ role: 'system', content: 'You are a friendly avatar assistant.' }],
          }))
          .withTts(new ElevenLabsTTS({
            key: 'your-elevenlabs-key',
            modelId: 'eleven_flash_v2_5',
            voiceId: 'your-voice-id',
            sampleRate: 16000,  // Required for Akool
          }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }))
          .withAvatar(new AkoolAvatar({
            apiKey: 'your-akool-key',
            avatarId: 'your-avatar-id',
          }));

        const session = agent.createSession(client, {
          channel: 'avatar-room',
          agentUid: '1',
          remoteUids: ['100'],
        });

        await session.start();
        ```

        ## HeyGenAvatar constructor options

        `HeyGenAvatar` is deprecated. Use `LiveAvatarAvatar` for new integrations.

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | HeyGen API key |
        | `quality` | `"low" \| "medium" \| "high"` | Yes | Video quality (360p / 480p / 720p) |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream (must be unique in the channel) |
        | `agoraToken` | `string` | No | Avatar token override. Omit to auto-generate at `session.start()` |
        | `avatarId` | `string` | No | HeyGen avatar ID |
        | `disableIdleTimeout` | `boolean` | No | Disable idle timeout (default: false) |
        | `activityIdleTimeout` | `number` | No | Idle timeout in seconds (default: 120) |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## LiveAvatarAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | LiveAvatar API key |
        | `quality` | `"low" \| "medium" \| "high"` | Yes | Video quality |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream (must be unique in the channel) |
        | `agoraToken` | `string` | No | Avatar token override. Omit to auto-generate at `session.start()` |
        | `avatarId` | `string` | No | Avatar ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## AkoolAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Akool API key |
        | `avatarId` | `string` | No | Akool avatar ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## AnamAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Anam API key |
        | `personaId` | `string` | No | Anam persona ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## GenericAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Custom avatar provider API key |
        | `apiBaseUrl` | `string` | Yes | Avatar provider API base URL |
        | `avatarId` | `string` | Yes | Avatar ID |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream |
        | `agoraAppId` | `string` | No | Omit to use the session App ID |
        | `agoraChannel` | `string` | No | Omit to use the session channel |
        | `agoraToken` | `string` | No | Avatar token override. Omit to auto-generate at `session.start()` |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |
      docs/guides/byok.md: |
        ---
        sidebar_position: 4
        title: BYOK
        description: Bring your own vendor credentials and use custom vendor configuration with the TypeScript SDK.
        ---

        # BYOK

        Use BYOK when you want to provide vendor credentials yourself instead of relying on Agora-managed models via the builder.

        Typical reasons:

        - you need a vendor model outside the Agora-managed catalog
        - you want to point to a custom endpoint
        - you want direct control over vendor-specific parameters
        - your organization manages vendor billing separately from Agora

        ## Full example

        ```typescript
        import {
          Agent,
          AgoraClient,
          Area,
          DeepgramSTT,
          ElevenLabsTTS,
          OpenAI,
        } from 'agora-agents';

        async function main(): Promise<void> {
          const client = new AgoraClient({
            area: Area.US,
            appId: 'your-app-id',
            appCertificate: 'your-app-certificate',
          });

          // In BYOK mode, each vendor carries its own credentials.
          const agent = new Agent({ name: 'support-assistant' })
            .withStt(
              new DeepgramSTT({
                apiKey: process.env.DEEPGRAM_API_KEY!,
                model: 'nova-3',
                language: 'en-US',
              }),
            )
            .withLlm(
              new OpenAI({
                apiKey: process.env.OPENAI_API_KEY!,
                model: 'gpt-4o-mini',
                systemMessages: [{ role: 'system', content: 'You are a concise support voice assistant.' }],
                greetingMessage: 'Hello! How can I help you today?',
                maxHistory: 10,
              }),
            )
            .withTts(
              new ElevenLabsTTS({
                key: process.env.ELEVENLABS_API_KEY!,
                modelId: 'eleven_flash_v2_5',
                voiceId: process.env.ELEVENLABS_VOICE_ID!,
                sampleRate: 24000,
              }),
            );

          const session = agent.createSession(client, {
            channel: 'support-room-123',
            agentUid: '1',
            remoteUids: ['100'],
            idleTimeout: 120,
          });

          const agentSessionId = await session.start();
          console.log('Agent started:', agentSessionId);

          await session.stop();
        }

        void main();
        ```

        ## Builder-managed vs BYOK

        - Builder without vendor keys: supported Agora-managed models
        - BYOK: your keys and full vendor control
      docs/guides/cascading-flow.md: |
        ---
        sidebar_position: 1
        title: Cascading Flow (ASR → LLM → TTS)
        description: Build a voice agent using Speech-to-Text, a text LLM, and Text-to-Speech.
        ---

        # Cascading Flow (ASR → LLM → TTS)

        The cascading flow is the default conversation mode: user audio is transcribed by an STT vendor, the text is sent to an LLM, and the response is synthesized back to audio by a TTS vendor.

        ```
        User audio → STT (speech-to-text) → LLM (generate response) → TTS (text-to-speech) → Agent audio
        ```

        ## Example 1: OpenAI + ElevenLabs + Deepgram

        The most common combination — OpenAI for language, ElevenLabs for natural voice, Deepgram for fast transcription.

        ### Wrapper approach (recommended)

        ```typescript
        import {
          AgoraClient,
          Area,
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
        } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'cascading-assistant' })
          .withLlm(new OpenAI({
            apiKey: 'your-openai-key',
            model: 'gpt-4o-mini',
            systemMessages: [{ role: 'system', content: 'You are a friendly voice assistant. Keep answers short and natural.' }],
            greetingMessage: 'Hi there! What can I do for you?',
            maxHistory: 20,
          }))
          .withTts(new ElevenLabsTTS({
            key: 'your-elevenlabs-key',
            modelId: 'eleven_flash_v2_5',
            voiceId: 'your-voice-id',
            sampleRate: 24000,
          }))
          .withStt(new DeepgramSTT({
            apiKey: 'your-deepgram-key',
            model: 'nova-2',
            language: 'en-US',
          }));

        const session = agent.createSession(client, {
          channel: 'my-room',
          agentUid: '1',
          remoteUids: ['100'],
          idleTimeout: 120,
        });

        const agentId = await session.start();
        console.log('Agent running:', agentId);

        // When done:
        await session.stop();
        ```

        ### Raw client approach

        For advanced use cases where you need full control over the request body:

        ```typescript
        import { AgoraClient, Area, generateRtcToken } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const token = generateRtcToken({
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
          channel: 'my-room',
          uid: 1,
        });

        const response = await client.agents.start({
          appid: 'your-app-id',
          name: 'raw-cascading-agent',
          properties: {
            channel: 'my-room',
            token,
            agent_rtc_uid: '1',
            remote_rtc_uids: ['100'],
            idle_timeout: 120,
            llm: {
              url: 'https://api.openai.com/v1/chat/completions',
              api_key: 'your-openai-key',
              params: { model: 'gpt-4o-mini' },
              system_messages: [{ role: 'system', content: 'You are a helpful voice assistant.' }],
              greeting_message: 'Hi there!',
              max_history: 20,
              input_modalities: ['text'],
              style: 'openai',
            },
            tts: {
              vendor: 'elevenlabs',
              params: {
                key: 'your-elevenlabs-key',
                model_id: 'eleven_flash_v2_5',
                voice_id: 'your-voice-id',
                sample_rate: 24000,
              },
            },
            asr: {
              vendor: 'deepgram',
              language: 'en-US',
              params: {
                api_key: 'your-deepgram-key',
                model: 'nova-2',
                language: 'en-US',
              },
            },
          },
        });

        console.log('Agent ID:', response.agent_id);
        ```

        The agentkit approach is preferred — it handles token generation, vendor serialization, and state management for you.

        ## Example 2: Azure OpenAI + Microsoft TTS + Microsoft STT

        An all-Microsoft stack, useful when you need to stay within Azure.

        ```typescript
        import {
          AgoraClient,
          Area,
          Agent,
          AzureOpenAI,
          MicrosoftTTS,
          MicrosoftSTT,
        } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.EU,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'azure-assistant' })
          .withLlm(new AzureOpenAI({
            apiKey: 'your-azure-openai-key',
            model: 'gpt-4',
            resourceName: 'my-azure-resource',
            deploymentName: 'gpt-4-deployment',
            systemMessages: [{ role: 'system', content: 'You are a professional support agent.' }],
            greetingMessage: 'Welcome! How can I assist you?',
            maxHistory: 15,
          }))
          .withTts(new MicrosoftTTS({
            key: 'your-azure-speech-key',
            region: 'eastus',
            voiceName: 'en-US-JennyNeural',
            sampleRate: 24000,
          }))
          .withStt(new MicrosoftSTT({
            key: 'your-azure-speech-key',
            region: 'eastus',
            language: 'en-US',
          }));

        const session = agent.createSession(client, {
          channel: 'support-room',
          agentUid: '1',
          remoteUids: ['100'],
        });

        await session.start();
        ```

        ## Configuration tips

        - **`maxHistory`** on the LLM vendor controls how many conversation turns are sent to the LLM. Higher values give better context but increase token usage and latency.
        - **`systemMessages`** on the LLM vendor provides the model prompt and keeps prompt ownership with the LLM configuration.
        - **`idleTimeout`** (in `SessionOptions`) auto-stops the agent if no audio activity is detected for the given number of seconds. Set to `0` to disable.

        ## Next steps

        - [MLLM Flow](./mllm-flow.md) — skip the ASR → LLM → TTS pipeline with OpenAI Realtime, Gemini Live, Vertex AI, or xAI Grok
        - [Avatar Integration](./avatars.md) — add a visual avatar to the agent
