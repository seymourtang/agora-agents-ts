        /**
         * Vendor-specific Avatar configuration types with strict type constraints.
         *
         * This provides type safety for vendor-specific parameters like sample rates,
         * ensuring that invalid combinations are caught at compile time.
         */

        import type { AvatarConfig as BaseAvatarConfig } from './types.js';

        /**
         * HeyGen-specific avatar configuration (legacy wire vendor `heygen`).
         *
         * @deprecated HeyGen has been renamed to LiveAvatar. Use {@link LiveAvatarAvatarConfig} instead.
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/heygen
         */
        export interface HeyGenAvatarConfig {
          enable?: boolean;
          vendor: 'heygen';
          params: {
            /** API key for HeyGen authentication (required) */
            api_key: string;
            /** Video quality: "high" (720p), "medium" (480p), or "low" (360p) (required) */
            quality: 'low' | 'medium' | 'high';
            /** RTC UID for the avatar (must be unique in the channel) (required) */
            agora_uid: string;
            /** Avatar ConvoAI token for avatar authentication (optional) */
            agora_token?: string;
            /** HeyGen avatar ID (optional) */
            avatar_id?: string;
            /** Whether to disable idle timeout (default: false) */
            disable_idle_timeout?: boolean;
            /** Idle timeout in seconds (default: 120, only applies if disable_idle_timeout is false) */
            activity_idle_timeout?: number;
            [key: string]: unknown;
          };
        }

        /**
         * LiveAvatar-specific avatar configuration (formerly HeyGen).
         *
         * ⚠️ IMPORTANT: LiveAvatar ONLY supports audio with a sample rate of 24,000 Hz.
         * You must configure your TTS with a 24kHz sample rate or the request will fail.
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/overview
         */
        export interface LiveAvatarAvatarConfig {
          enable?: boolean;
          vendor: 'liveavatar';
          params: {
            /** API key for LiveAvatar authentication (required) */
            api_key: string;
            /** Video quality: "high" (720p), "medium" (480p), or "low" (360p) (required) */
            quality: 'low' | 'medium' | 'high';
            /** RTC UID for the avatar (must be unique in the channel) (required) */
            agora_uid: string;
            /** Avatar ConvoAI token for avatar authentication (optional) */
            agora_token?: string;
            /** Avatar ID (optional) */
            avatar_id?: string;
            /** Whether to disable idle timeout (default: false) */
            disable_idle_timeout?: boolean;
            /** Idle timeout in seconds (default: 120, only applies if disable_idle_timeout is false) */
            activity_idle_timeout?: number;
            [key: string]: unknown;
          };
        }

        /**
         * Anam-specific avatar configuration (Beta).
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/overview
         */
        export interface AnamAvatarConfig {
          enable?: boolean;
          vendor: 'anam';
          params: {
            /** API key for Anam authentication (required) */
            api_key: string;
            /** Anam persona ID (optional) */
            persona_id?: string;
            [key: string]: unknown;
          };
        }

        /**
         * Akool-specific avatar configuration.
         *
         * ⚠️ IMPORTANT: Akool avatars ONLY support audio with a sample rate of 16,000 Hz.
         * You must configure your TTS with a 16kHz sample rate or the request will fail.
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/akool
         */
        export interface AkoolAvatarConfig {
          enable?: boolean;
          vendor: 'akool';
          params: {
            /** API key for Akool authentication (required) */
            api_key: string;
            /** Akool avatar ID (optional) */
            avatar_id?: string;
            /** Additional vendor-specific parameters */
            [key: string]: unknown;
          };
        }

        /**
         * Generic avatar configuration.
         * Use this when integrating a custom avatar provider.
         */
        export interface GenericAvatarConfig {
          enable?: boolean;
          vendor: 'generic';
          params: {
            /** Avatar provider API key (required) */
            api_key: string;
            /** Avatar provider API base URL (required) */
            api_base_url: string;
            /** Avatar ID (required) */
            avatar_id: string;
            /** Agora App ID (filled by AgentKit at session start when omitted) */
            agora_appid?: string;
            /** Agora channel (filled by AgentKit at session start when omitted) */
            agora_channel?: string;
            /** RTC UID for the avatar video publisher (required) */
            agora_uid: string;
            /** Avatar ConvoAI token (filled by AgentKit at session start when omitted) */
            agora_token?: string;
            [key: string]: unknown;
          };
        }

        /**
         * Discriminated union of all avatar configurations.
         * TypeScript will enforce vendor-specific constraints based on the vendor field.
         */
        export type StrictAvatarConfig =
          | HeyGenAvatarConfig
          | LiveAvatarAvatarConfig
          | AkoolAvatarConfig
          | AnamAvatarConfig
          | GenericAvatarConfig;

        /**
         * Helper type guard to check if an avatar config uses the legacy HeyGen wire vendor.
         */
        export function isHeyGenAvatar(
          config: StrictAvatarConfig,
        ): config is HeyGenAvatarConfig {
          return config.vendor === 'heygen';
        }

        /**
         * Helper type guard to check if an avatar config is for LiveAvatar (formerly HeyGen).
         */
        export function isLiveAvatarAvatar(
          config: StrictAvatarConfig,
        ): config is LiveAvatarAvatarConfig {
          return config.vendor === 'liveavatar';
        }

        /**
         * Helper type guard to check if an avatar config is for Akool.
         */
        export function isAkoolAvatar(
          config: StrictAvatarConfig,
        ): config is AkoolAvatarConfig {
          return config.vendor === 'akool';
        }

        /**
         * Helper type guard to check if an avatar config is for Anam.
         */
        export function isAnamAvatar(
          config: StrictAvatarConfig,
        ): config is AnamAvatarConfig {
          return config.vendor === 'anam';
        }

        /**
         * Helper type guard to check if an avatar config is for Generic Avatar.
         */
        export function isGenericAvatar(
          config: StrictAvatarConfig,
        ): config is GenericAvatarConfig {
          return config.vendor === 'generic';
        }

        /**
         * Returns true when AgentKit manages the avatar's RTC publisher identity
         * (i.e. fills `agora_token`, validates uniqueness against the agent UID).
         *
         * Mirrors the Go and Python SDK gate so all language SDKs behave identically.
         */
        export function isAvatarTokenManaged(config: StrictAvatarConfig): boolean {
          return (
            isHeyGenAvatar(config) ||
            isLiveAvatarAvatar(config) ||
            isGenericAvatar(config)
          );
        }

        /**
         * Validates avatar configuration at runtime.
         * TypeScript catches most issues, but this provides runtime validation
         * for cases where types are bypassed or data comes from external sources.
         *
         * @param options.requireSessionFields - When true, require fields AgentKit
         * fills during `AgentSession.start()` for Generic avatars.
         * @throws {Error} If the configuration is invalid
         */
        export function validateAvatarConfig(
          config: StrictAvatarConfig,
          options: { requireSessionFields?: boolean } = {},
        ): void {
          const validQualities = ['low', 'medium', 'high'];

          if (isHeyGenAvatar(config) || isLiveAvatarAvatar(config)) {
            const label = isHeyGenAvatar(config) ? 'HeyGen' : 'LiveAvatar';
            if (!config.params.api_key) {
              throw new Error(`${label} avatar requires api_key`);
            }
            if (!config.params.quality) {
              throw new Error(
                `${label} avatar requires quality (low, medium, or high)`,
              );
            }
            if (!config.params.agora_uid) {
              throw new Error(`${label} avatar requires agora_uid`);
            }
            if (!validQualities.includes(config.params.quality)) {
              throw new Error(
                `Invalid quality for ${label}: ${config.params.quality}. ` +
                  `Must be one of: ${validQualities.join(', ')}`,
              );
            }
          } else if (isAkoolAvatar(config)) {
            if (!config.params.api_key) {
              throw new Error('Akool avatar requires api_key');
            }
          } else if (isAnamAvatar(config)) {
            if (!config.params.api_key) {
              throw new Error('Anam avatar requires api_key');
            }
          } else if (isGenericAvatar(config)) {
            if (!config.params.api_key) {
              throw new Error('Generic avatar requires api_key');
            }
            if (!config.params.api_base_url) {
              throw new Error('Generic avatar requires api_base_url');
            }
            if (!config.params.avatar_id) {
              throw new Error('Generic avatar requires avatar_id');
            }
            if (!config.params.agora_uid) {
              throw new Error('Generic avatar requires agora_uid');
            }
            if (options.requireSessionFields) {
              if (!config.params.agora_appid) {
                throw new Error(
                  'Generic avatar requires agora_appid after session enrichment',
                );
              }
              if (!config.params.agora_channel) {
                throw new Error(
                  'Generic avatar requires agora_channel after session enrichment',
                );
              }
              if (!config.params.agora_token) {
                throw new Error(
                  'Generic avatar requires agora_token after session enrichment',
                );
              }
            }
          }
        }

        /**
         * Validates that TTS sample rate is compatible with the avatar vendor.
         *
         * Different avatar vendors have specific sample rate requirements:
         * - ⚠️ HeyGen: ONLY supports 24,000 Hz
         * - ⚠️ Akool: ONLY supports 16,000 Hz
         *
         * This function helps catch TTS/Avatar misconfigurations at runtime.
         *
         * @param avatarConfig - The avatar configuration
         * @param ttsSampleRate - The sample rate from your TTS configuration (in Hz)
         * @throws {Error} If TTS sample rate is incompatible with the avatar vendor
         *
         * @example
         * ```typescript
         * // HeyGen example
         * const heygenAvatar: HeyGenAvatarConfig = { vendor: 'heygen', ... };
         * validateTtsSampleRate(heygenAvatar, 24000); // ✅ Passes
         * validateTtsSampleRate(heygenAvatar, 16000); // ❌ Throws error
         *
         * // Akool example
         * const akoolAvatar: AkoolAvatarConfig = { vendor: 'akool', ... };
         * validateTtsSampleRate(akoolAvatar, 16000); // ✅ Passes
         * validateTtsSampleRate(akoolAvatar, 24000); // ❌ Throws error
         * ```
         */
        export function validateTtsSampleRate(
          avatarConfig: StrictAvatarConfig,
          ttsSampleRate: number,
        ): void {
          if (isHeyGenAvatar(avatarConfig) || isLiveAvatarAvatar(avatarConfig)) {
            if (ttsSampleRate !== 24000) {
              const label = isHeyGenAvatar(avatarConfig) ? 'HeyGen' : 'LiveAvatar';
              throw new Error(
                `${label} avatars ONLY support 24,000 Hz sample rate. ` +
                  `Your TTS is configured with ${ttsSampleRate} Hz. ` +
                  `Please update your TTS configuration to use 24kHz sample rate. ` +
                  `See: https://docs.agora.io/en/conversational-ai/models/avatar/overview`,
              );
            }
          } else if (isAkoolAvatar(avatarConfig)) {
            if (ttsSampleRate !== 16000) {
              throw new Error(
                `Akool avatars ONLY support 16,000 Hz sample rate. ` +
                  `Your TTS is configured with ${ttsSampleRate} Hz. ` +
                  `Please update your TTS configuration to use 16kHz sample rate. ` +
                  `See: https://docs.agora.io/en/conversational-ai/models/avatar/akool`,
              );
            }
          }
        }

        /**
         * Converts strict avatar config to base avatar config for API calls.
         * This bridges the gap between our type-safe agentkit and Fern's generated types.
         */
        export function toBaseAvatarConfig(
          config: StrictAvatarConfig,
        ): BaseAvatarConfig {
          return config as unknown as BaseAvatarConfig;
        }
      src/agentkit/vendors/avatar.ts: |
        /**
         * Type-safe Avatar vendor classes.
         *
         * Avatar vendors provide visual representation for voice agents.
         * Different vendors have specific audio sample rate requirements.
         */

        import type { AvatarConfig } from '../types.js';
        import type { AkoolSampleRate, HeyGenSampleRate, LiveAvatarSampleRate } from './base.js';
        import { BaseAvatar } from './base.js';

        /**
         * Constructor options for LiveAvatar.
         */
        export interface LiveAvatarAvatarOptions {
          /** LiveAvatar API key */
          apiKey: string;
          /** Video quality: "low" (360p), "medium" (480p), or "high" (720p) */
          quality: 'low' | 'medium' | 'high';
          /** RTC UID for the avatar (must be unique in the channel) */
          agoraUid: string;
          /** Avatar ConvoAI token. Omit to auto-generate at session start. */
          agoraToken?: string;
          /** Avatar ID */
          avatarId?: string;
          /** Whether to disable idle timeout (default: false) */
          disableIdleTimeout?: boolean;
          /** Idle timeout in seconds (default: 120, only applies if disableIdleTimeout is false) */
          activityIdleTimeout?: number;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Constructor options for Akool Avatar.
         */
        export interface AkoolAvatarOptions {
          /** Akool API key */
          apiKey: string;
          /** Akool avatar ID */
          avatarId?: string;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Akool Avatar vendor.
         *
         * ⚠️ IMPORTANT: Akool avatars ONLY support audio with a sample rate of 16,000 Hz.
         * You must configure your TTS with a 16kHz sample rate or the request will fail.
         *
         * @example
         * ```typescript
         * import { Agent, AkoolAvatar, ElevenLabsTTS } from 'agora-agent-server-sdk';
         *
         * const avatar = new AkoolAvatar({
         *   apiKey: process.env.AKOOL_API_KEY,
         *   avatarId: 'avatar-id',
         * });
         *
         * // TTS must declare sampleRate: 16000 so withAvatar() enforces the match at compile time.
         * const tts = new ElevenLabsTTS({
         *   key: process.env.ELEVENLABS_API_KEY,
         *   modelId: 'eleven_flash_v2_5',
         *   voiceId: 'voice-id',
         *   sampleRate: 16000, // Required for Akool
         * });
         *
         * const agent = new Agent({ name: 'avatar-assistant' })
         *   .withTts(tts)
         *   .withAvatar(avatar);
         * ```
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/akool
         */
        export class AkoolAvatar extends BaseAvatar<AkoolSampleRate> {
          private readonly options: AkoolAvatarOptions;

          /**
           * Akool avatars require TTS sample rate of 16,000 Hz.
           */
          readonly requiredSampleRate = 16000 as const;

          constructor(options: AkoolAvatarOptions) {
            super();
            this.options = options;

            // Defense-in-depth check for JavaScript callers that bypass TypeScript types.
            // See HeyGenAvatar constructor for the two-layer validation rationale.
            if (!options.apiKey) {
              throw new Error('Akool avatar requires apiKey');
            }
          }

          toConfig(): AvatarConfig {
            const { apiKey, avatarId, enable = true, additionalParams } = this.options;

            return {
              enable,
              vendor: 'akool',
              params: {
                // additionalParams spread first so that explicit fields always win.
                ...additionalParams,
                api_key: apiKey,
                ...(avatarId && { avatar_id: avatarId }),
              },
            };
          }
        }

        // =============================================================================
        // LiveAvatar (formerly HeyGen)
        // =============================================================================

        /**
         * LiveAvatar avatar vendor (formerly HeyGen).
         *
         * ⚠️ IMPORTANT: LiveAvatar ONLY supports audio with a sample rate of 24,000 Hz.
         * You must configure your TTS with a 24kHz sample rate or the request will fail.
         *
         * @example
         * ```typescript
         * import { Agent, LiveAvatarAvatar, ElevenLabsTTS } from 'agora-agent-server-sdk';
         *
         * const avatar = new LiveAvatarAvatar({
         *   apiKey: process.env.LIVEAVATAR_API_KEY,
         *   quality: 'high',
         *   agoraUid: '12345',
         *   avatarId: 'avatar-id',
         * });
         *
         * const tts = new ElevenLabsTTS({
         *   apiKey: process.env.ELEVENLABS_API_KEY,
         *   modelId: 'eleven_flash_v2_5',
         *   voiceId: 'voice-id',
         *   sampleRate: 24000, // Required for LiveAvatar
         * });
         *
         * const agent = new Agent({ name: 'avatar-assistant' })
         *   .withTts(tts)
         *   .withAvatar(avatar);
         * ```
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/overview
         */
        export class LiveAvatarAvatar extends BaseAvatar<LiveAvatarSampleRate> {
          private readonly options: LiveAvatarAvatarOptions;

          /**
           * LiveAvatar requires TTS sample rate of 24,000 Hz.
           */
          readonly requiredSampleRate = 24000 as const;

          constructor(options: LiveAvatarAvatarOptions) {
            super();
            this.options = options;

            if (!options.apiKey) {
              throw new Error('LiveAvatar requires apiKey');
            }
            if (!options.agoraUid) {
              throw new Error('LiveAvatar requires agoraUid');
            }
          }

          toConfig(): AvatarConfig {
            const {
              apiKey,
              quality,
              agoraUid,
              agoraToken,
              avatarId,
              disableIdleTimeout,
              activityIdleTimeout,
              enable = true,
              additionalParams,
            } = this.options;

            return {
              enable,
              vendor: 'liveavatar',
              params: {
                ...additionalParams,
                api_key: apiKey,
                quality,
                agora_uid: agoraUid,
                ...(agoraToken && { agora_token: agoraToken }),
                ...(avatarId && { avatar_id: avatarId }),
                ...(disableIdleTimeout !== undefined && {
                  disable_idle_timeout: disableIdleTimeout,
                }),
                ...(activityIdleTimeout !== undefined && {
                  activity_idle_timeout: activityIdleTimeout,
                }),
              },
            };
          }
        }

        /**
         * @deprecated HeyGen has been renamed to LiveAvatar. Use {@link LiveAvatarAvatarOptions} instead.
         */
        export type HeyGenAvatarOptions = LiveAvatarAvatarOptions;

        /**
         * HeyGen Avatar vendor.
         *
         * @deprecated HeyGen has been renamed to LiveAvatar. Use {@link LiveAvatarAvatar} instead.
         * This class emits `vendor: "heygen"` for backward compatibility. New deployments
         * should use `LiveAvatarAvatar` which emits `vendor: "liveavatar"`.
         */
        export class HeyGenAvatar extends BaseAvatar<HeyGenSampleRate> {
          private readonly options: HeyGenAvatarOptions;

          readonly requiredSampleRate = 24000 as const;

          constructor(options: HeyGenAvatarOptions) {
            super();
            this.options = options;
            if (!options.apiKey) {
              throw new Error('HeyGen avatar requires apiKey');
            }
            if (!options.agoraUid) {
              throw new Error('HeyGen avatar requires agoraUid');
            }
          }

          toConfig(): AvatarConfig {
            const {
              apiKey,
              quality,
              agoraUid,
              agoraToken,
              avatarId,
              disableIdleTimeout,
              activityIdleTimeout,
              enable = true,
              additionalParams,
            } = this.options;

            return {
              enable,
              vendor: 'heygen',
              params: {
                ...additionalParams,
                api_key: apiKey,
                quality,
                agora_uid: agoraUid,
                ...(agoraToken && { agora_token: agoraToken }),
                ...(avatarId && { avatar_id: avatarId }),
                ...(disableIdleTimeout !== undefined && {
                  disable_idle_timeout: disableIdleTimeout,
                }),
                ...(activityIdleTimeout !== undefined && {
                  activity_idle_timeout: activityIdleTimeout,
                }),
              },
            };
          }
        }

        // =============================================================================
        // Anam
        // =============================================================================

        /**
         * Constructor options for Anam Avatar.
         */
        export interface AnamAvatarOptions {
          /** Anam API key */
          apiKey: string;
          /** Anam persona ID */
          personaId?: string;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Anam Avatar vendor (Beta).
         *
         * @example
         * ```typescript
         * import { Agent, AnamAvatar } from 'agora-agent-server-sdk';
         *
         * const avatar = new AnamAvatar({
         *   apiKey: process.env.ANAM_API_KEY,
         *   personaId: 'persona-id',
         * });
         *
         * const agent = new Agent({ name: 'avatar-assistant' })
         *   .withAvatar(avatar);
         * ```
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/overview
         */
        export class AnamAvatar extends BaseAvatar<number> {
          private readonly options: AnamAvatarOptions;

          /**
           * Anam does not enforce a specific TTS sample rate. Consult Anam documentation
           * for the sample rate supported by your chosen persona.
           */
          readonly requiredSampleRate = 0 as number;

          constructor(options: AnamAvatarOptions) {
            super();
            this.options = options;

            if (!options.apiKey) {
              throw new Error('Anam avatar requires apiKey');
            }
          }

          toConfig(): AvatarConfig {
            const { apiKey, personaId, enable = true, additionalParams } = this.options;

            return {
              enable,
              vendor: 'anam',
              params: {
                ...additionalParams,
                api_key: apiKey,
                ...(personaId && { persona_id: personaId }),
              },
            };
          }
        }

        // =============================================================================
        // Generic
        // =============================================================================

        /**
         * Constructor options for Generic Avatar.
         */
        export interface GenericAvatarOptions {
          /** Avatar provider API key */
          apiKey: string;
          /** Avatar provider API base URL */
          apiBaseUrl: string;
          /** Avatar ID */
          avatarId: string;
          /** RTC UID for the avatar video publisher (must be unique in the channel) */
          agoraUid: string;
          /** Agora App ID. Omit to use the session app ID at start. */
          agoraAppId?: string;
          /** Agora channel. Omit to use the session channel at start. */
          agoraChannel?: string;
          /** Avatar ConvoAI token. Omit to auto-generate at session start. */
          agoraToken?: string;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Generic Avatar vendor (Beta).
         *
         * Generic avatars use a custom avatar provider while still publishing video
         * into the Agora channel. AgentKit fills `agora_appid`, `agora_channel`, and
         * `agora_token` at session start when they are omitted.
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/generic
         */
        export class GenericAvatar extends BaseAvatar<number> {
          private readonly options: GenericAvatarOptions;

          /**
           * Generic avatars do not enforce a specific TTS sample rate.
           */
          readonly requiredSampleRate = 0 as number;

          constructor(options: GenericAvatarOptions) {
            super();
            this.options = options;

            if (!options.apiKey) {
              throw new Error('Generic avatar requires apiKey');
            }
            if (!options.apiBaseUrl) {
              throw new Error('Generic avatar requires apiBaseUrl');
            }
            if (!options.avatarId) {
              throw new Error('Generic avatar requires avatarId');
            }
            if (!options.agoraUid) {
              throw new Error('Generic avatar requires agoraUid');
            }
          }

          toConfig(): AvatarConfig {
            const {
              apiKey,
              apiBaseUrl,
              avatarId,
              agoraUid,
              agoraAppId,
              agoraChannel,
              agoraToken,
              enable = true,
              additionalParams,
            } = this.options;

            return {
              enable,
              vendor: 'generic',
              params: {
                ...additionalParams,
                api_key: apiKey,
                api_base_url: apiBaseUrl,
                avatar_id: avatarId,
                agora_uid: agoraUid,
                ...(agoraAppId && { agora_appid: agoraAppId }),
                ...(agoraChannel && { agora_channel: agoraChannel }),
                ...(agoraToken && { agora_token: agoraToken }),
              },
            };
          }
        }
      src/agentkit/vendors/base.ts: |
        /**
         * Base classes for type-safe vendor configurations.
         *
         * Each vendor class extends a base class and implements a `toConfig()` method
         * that converts TypeScript-friendly constructor params (camelCase) into the
         * Agora API format (snake_case).
         */

        import type {
          LlmConfig,
          TtsConfig,
          SttConfig,
          MllmConfig,
          AvatarConfig,
          McpServersItem,
          LlmGreetingConfigs,
        } from '../types.js';

        /**
         * Common options shared by all LLM vendor classes.
         * These map directly to top-level fields on `LlmConfig` that are not
         * vendor-specific and therefore belong here rather than on individual vendors.
         */
        export interface BaseLlmOptions {
          /**
           * LLM output modalities.
           * - `["text"]` (default): Output text is converted to speech by TTS and published to RTC.
           * - `["audio"]`: Voice only — audio published directly to RTC (no TTS step).
           * - `["text", "audio"]`: Both text and audio; handle the output with custom logic.
           */
          outputModalities?: string[];
          /**
           * Greeting broadcast mode for multi-user channels.
           * - `"single_every"`: Broadcasts a greeting every time a user joins.
           * - `"single_first"`: Broadcasts a greeting only once to the first user.
           */
          greetingConfigs?: LlmGreetingConfigs;
          /**
           * Key-value pairs injected into `system_messages`, `greeting_message`, and
           * `failure_message` via `{{variable_name}}` syntax. Useful for per-session
           * personalisation (e.g. injecting the caller's name into the system prompt).
           * Variable values cannot reference other variables.
           */
          templateVariables?: Record<string, string>;
          /**
           * LLM provider hint.
           * - `"custom"`: Adds `turn_id` and `timestamp` fields to every LLM request —
           *   useful for custom LLM backends that need per-turn tracking.
           * - `"azure"`: Required for Azure OpenAI (set automatically by `AzureOpenAI`).
           * Omit for standard OpenAI / Anthropic / Gemini endpoints.
           */
          vendor?: string;
          /** MCP server configurations enabling the agent to call tools from external services */
          mcpServers?: McpServersItem[];
        }

        /**
         * Standard audio sample rates supported by Agora platform.
         * Different vendors support different subsets of these rates.
         */
        export type SampleRate = 8000 | 16000 | 22050 | 24000 | 44100 | 48000;

        /**
         * Sample rates supported by ElevenLabs TTS.
         * - 16000 Hz: Required for Akool avatars
         * - 24000 Hz: Required for HeyGen avatars
         * - 22050, 44100 Hz: High quality, no avatar support
         */
        export type ElevenLabsSampleRate = 16000 | 22050 | 24000 | 44100;

        /**
         * Sample rates supported by Microsoft Azure TTS.
         */
        export type MicrosoftSampleRate = 16000 | 24000 | 48000;

        /**
         * Sample rates supported by Cartesia TTS.
         */
        export type CartesiaSampleRate = 8000 | 16000 | 22050 | 24000 | 44100 | 48000;

        /**
         * Sample rates supported by Google Cloud TTS.
         */
        export type GoogleTTSSampleRate = 8000 | 16000 | 22050 | 24000 | 44100 | 48000;

        /**
         * Sample rate required by LiveAvatar avatars (24kHz only). Formerly HeyGen.
         */
        export type LiveAvatarSampleRate = 24000;

        /**
         * @deprecated HeyGen has been renamed to LiveAvatar. Use {@link LiveAvatarSampleRate} instead.
         */
        export type HeyGenSampleRate = LiveAvatarSampleRate;

        /**
         * Sample rate required by Akool avatars (16kHz only).
         */
        export type AkoolSampleRate = 16000;

        /**
         * Base class for LLM (Large Language Model) vendors.
         */
        export abstract class BaseLLM {
          private readonly _outputModalities?: string[];
          private readonly _greetingConfigs?: LlmGreetingConfigs;
          private readonly _templateVariables?: Record<string, string>;
          private readonly _vendor?: string;
          private readonly _mcpServers?: McpServersItem[];

          constructor(options?: BaseLlmOptions) {
            this._outputModalities = options?.outputModalities;
            this._greetingConfigs = options?.greetingConfigs;
            this._templateVariables = options?.templateVariables;
            this._vendor = options?.vendor;
            this._mcpServers = options?.mcpServers;
          }

          protected get outputModalities(): string[] | undefined {
            return this._outputModalities;
          }
          protected get greetingConfigs(): LlmGreetingConfigs | undefined {
            return this._greetingConfigs;
          }
          protected get templateVariables(): Record<string, string> | undefined {
            return this._templateVariables;
          }
          protected get vendor(): string | undefined {
            return this._vendor;
          }
          /** MCP servers with transport defaulted to streamable_http (API requires it; only option). */
          protected get mcpServers(): McpServersItem[] | undefined {
            if (!this._mcpServers?.length) return this._mcpServers;
            return this._mcpServers.map((s) =>
              s.transport ? s : { ...s, transport: 'streamable_http' as const },
            );
          }

          /**
           * Converts the vendor configuration to the Agora API format.
           */
          abstract toConfig(): LlmConfig;
        }

        /**
         * Base class for TTS (Text-to-Speech) vendors with sample rate tracking.
         *
         * `SR` is a phantom type — it is never used at runtime and does not appear in
         * the `toConfig()` return type. Its sole purpose is to thread the sample rate
         * literal through `Agent<TTSSampleRate>` so that `withAvatar()` can enforce
         * TTS/avatar compatibility at compile time.
         *
         * This means TypeScript cannot verify that a concrete subclass actually emits
         * the sample rate it declares — e.g., `class MyTTS extends BaseTTS<24000>`
         * could emit `sample_rate: 16000` in its config without a type error. The
         * guarantee is therefore "the vendor class declares what it supports", not
         * "the config it produces is verified". Runtime validation in AgentSession
         * provides a second layer of safety for known avatar vendors.
         *
         * @template SR - Sample rate literal type (e.g., 24000, 16000)
         */
        export abstract class BaseTTS<SR extends number = number> {
          /**
           * Converts the vendor configuration to the Agora API format.
           */
          abstract toConfig(): TtsConfig;
        }

        /**
         * Base class for STT (Speech-to-Text) vendors.
         */
        export abstract class BaseSTT {
          /**
           * Converts the vendor configuration to the Agora API format.
           */
          abstract toConfig(): SttConfig;
        }

        /**
         * Base class for MLLM (Multimodal Large Language Model) vendors.
         */
        export abstract class BaseMLLM {
          /**
           * Converts the vendor configuration to the Agora API format.
           */
          abstract toConfig(): MllmConfig;
        }

        /**
         * Base class for Avatar vendors with required sample rate.
         * @template RequiredSR - Required sample rate literal type
         */
        export abstract class BaseAvatar<RequiredSR extends number = number> {
          /**
           * Converts the vendor configuration to the Agora API format.
           */
          abstract toConfig(): AvatarConfig;

          /**
           * The TTS sample rate required by this avatar vendor.
           */
          abstract readonly requiredSampleRate: RequiredSR;
        }
