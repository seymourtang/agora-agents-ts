      docs/concepts/agent.md: |
        ---
        sidebar_position: 2
        title: Agent
        description: The Agent builder — configure an AI agent with LLM, TTS, STT, and more.
        ---

        # Agent

        `Agent` is an immutable configuration object. Every builder method returns a **new** `Agent` instance — the original is never modified. This makes agents safe to reuse across multiple sessions.

        ## Constructor options

        <!-- snippet: executable -->
        ```typescript
        import { Agent } from 'agora-agents';

        const agent = new Agent({
          name: 'my-assistant',
          instructions: 'You are a helpful voice assistant.',
          greeting: 'Hello! How can I help?',
          maxHistory: 20,
        });
        ```

        | Option | Type | Description |
        |---|---|---|
        | `name` | `string` | Agent name (used as default session name) |
        | `instructions` | `string` | System prompt — sent as a system message to the LLM |
        | `greeting` | `string` | First message spoken when the session starts |
        | `failureMessage` | `string` | Message spoken when an LLM call fails |
        | `maxHistory` | `number` | Max conversation turns kept in LLM context |
        | `turnDetection` | `TurnDetectionConfig` | Voice activity detection settings |
        | `sal` | `SalConfig` | Selective Attention Locking configuration |
        | `avatar` | `AvatarConfig` | Avatar configuration (prefer `withAvatar()` for type safety) |
        | `advancedFeatures` | `AdvancedFeatures` | Enable MLLM mode, AI-VAD, etc. |
        | `parameters` | `SessionParams` | Session parameters (silence config, farewell config) |
        | `geofence` | `GeofenceConfig` | Regional access restriction |
        | `labels` | `Labels` | Custom key-value labels (returned in callbacks) |
        | `rtc` | `RtcConfig` | RTC media encryption |
        | `fillerWords` | `FillerWordsConfig` | Filler words while waiting for LLM |

        ## Builder methods

        Each method returns a new `Agent` instance with the updated configuration.

        | Method | Signature | Description |
        |---|---|---|
        | `withLlm` | `withLlm(vendor: BaseLLM): Agent` | Set the LLM vendor |
        | `withTts` | `withTts<SR>(vendor: BaseTTS<SR>): Agent<SR>` | Set the TTS vendor (tracks sample rate type) |
        | `withStt` | `withStt(vendor: BaseSTT): Agent` | Set the STT vendor |
        | `withMllm` | `withMllm(vendor: BaseMLLM): Agent` | Set the MLLM vendor (for multimodal flow). Not compatible with `withAvatar()`. |
        | `withAvatar` | `withAvatar<SR>(vendor: BaseAvatar<SR>): Agent` | Set the avatar vendor (enforces TTS sample rate match). Requires the cascading pipeline; not supported with `withMllm()`. |
        | `withTurnDetection` | `withTurnDetection(config: TurnDetectionConfig): Agent` | Configure cascading-flow SOS/EOS detection; use `withInterruption()` for interruption behavior |
        | `withInstructions` | `withInstructions(text: string): Agent` | Override the system prompt |
        | `withGreeting` | `withGreeting(text: string): Agent` | Override the greeting message |
        | `withName` | `withName(name: string): Agent` | Override the agent name |
        | `withSal` | `withSal(config: SalConfig): Agent` | Set SAL configuration |
        | `withAdvancedFeatures` | `withAdvancedFeatures(features: AdvancedFeatures): Agent` | Set advanced features |
        | `withParameters` | `withParameters(parameters: SessionParams): Agent` | Set session parameters |
        | `withFailureMessage` | `withFailureMessage(message: string): Agent` | Set failure message |
        | `withMaxHistory` | `withMaxHistory(maxHistory: number): Agent` | Set max history length |
        | `withGeofence` | `withGeofence(geofence: GeofenceConfig): Agent` | Set geofence configuration |
        | `withLabels` | `withLabels(labels: Labels): Agent` | Set custom labels |
        | `withRtc` | `withRtc(rtc: RtcConfig): Agent` | Set RTC configuration |
        | `withFillerWords` | `withFillerWords(fillerWords: FillerWordsConfig): Agent` | Set filler words configuration |

        ## Creating a session

        Call `createSession()` to bind the agent to a client and channel:

        <!-- snippet: fragment -->
        ```typescript
        const session = agent.createSession(client, {
          channel: 'room-123',
          agentUid: '1',
          remoteUids: ['100'],
          idleTimeout: 120,
        });
        ```

        ### SessionOptions

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `channel` | `string` | Yes | Channel name to join |
        | `agentUid` | `string` | Yes | The agent's RTC UID |
        | `remoteUids` | `string[]` | Yes | Remote user UIDs to subscribe to |
        | `name` | `string` | No | Session name (defaults to agent name or auto-generated) |
        | `token` | `string` | No | Pre-built RTC token (omit to auto-generate) |
        | `idleTimeout` | `number` | No | Seconds before auto-exit if no audio (0 = disabled) |
        | `enableStringUid` | `boolean` | No | Use string UIDs instead of numeric |
        | `debug` | `boolean` | No | Log API requests to console |

        ## Immutable reuse

        Because every method returns a new instance, you can create a base agent and derive variations:

        <!-- snippet: executable -->
        ```typescript
        import { Agent, OpenAI, ElevenLabsTTS, DeepgramSTT } from 'agora-agents';

        const base = new Agent({ instructions: 'You are helpful.' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({ key: 'your-elevenlabs-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }));

        // Two sessions from the same agent config — safe, no shared mutable state
        const sessionA = base.createSession(client, { channel: 'room-a', agentUid: '1', remoteUids: ['100'] });
        const sessionB = base.createSession(client, { channel: 'room-b', agentUid: '1', remoteUids: ['200'] });
        ```

        See [Agent Reference](../reference/agent.md) for full TypeScript signatures.
      docs/concepts/session.md: |
        ---
        sidebar_position: 3
        title: AgentSession
        description: Manage the full lifecycle of a running Agora Conversational AI agent.
        ---

        # AgentSession

        `AgentSession` manages the full lifecycle of a running agent — from starting to stopping, with events and interaction methods in between.

        Create a session via [`agent.createSession()`](./agent.md):

        <!-- snippet: fragment -->
        ```typescript
        const session = agent.createSession(client, {
          channel: 'my-room',
          agentUid: '1',
          remoteUids: ['100'],
        });
        ```

        Presets are also configured at session creation time. That matches the underlying Agora start/join API, where presets are applied to a specific agent run rather than to the reusable `Agent` definition.

        ## State machine

        A session progresses through these states:

        ```
        idle ──► starting ──► running ──► stopping ──► stopped
                                 │
                                 ▼
                               error
        ```

        | State | Meaning |
        |---|---|
        | `idle` | Session created but not yet started |
        | `starting` | `start()` called; waiting for the API response |
        | `running` | Agent is active in the channel; you can call `say()`, `interrupt()`, `update()` |
        | `stopping` | `stop()` called; waiting for the agent to leave |
        | `stopped` | Agent has left the channel; session is finished |
        | `error` | An unrecoverable error occurred during `start()` or `stop()` |

        Read the current state with `session.status`.

        ## Methods

        All interaction methods require the session to be in the `running` state.

        | Method | Returns | Description |
        |---|---|---|
        | `start()` | `Promise<string>` | Start the agent. Transitions `idle → starting → running`. Returns the `agentId`. |
        | `stop()` | `Promise<void>` | Stop the agent. Transitions `running → stopping → stopped`. Handles already-stopped agents gracefully. |
        | `say(text, options?)` | `Promise<void>` | Instruct the agent to speak `text`. Optional `priority` and `interruptable` fields. |
        | `interrupt()` | `Promise<void>` | Interrupt the agent's current speech. |
        | `update(config)` | `Promise<void>` | Update the agent configuration mid-session (LLM params, TTS, etc.). |
        | `getHistory()` | `Promise<ConversationHistory>` | Fetch conversation history for this session. |
        | `getInfo()` | `Promise<SessionInfo>` | Fetch current agent metadata. |
        | `on(event, handler)` | `void` | Subscribe to a session event. |
        | `off(event, handler)` | `void` | Unsubscribe from a session event. |

        ## Presets, inferred presets, and BYOK

        AgentKit supports three ways to use reseller-backed models:

        - Pass `preset` directly in `createSession(...)` when you want explicit control over the base reseller stack.
        - Use supported preset-backed vendor models without credentials and let AgentKit infer the matching preset automatically.
        - Use the same models with your own vendor credentials when you want BYOK instead.

        Examples:

        <!-- snippet: fragment -->
        ```typescript
        const explicitPresetSession = agent.createSession(client, {
          channel: 'my-room',
          agentUid: '1',
          remoteUids: ['100'],
          preset: 'deepgram_nova_3,openai_gpt_5_mini,openai_tts_1',
        });
        ```

        <!-- snippet: fragment -->
        ```typescript
        const inferredPresetAgent = new Agent({ instructions: 'Be concise.' })
          .withStt(new DeepgramSTT({ model: 'nova-3', language: 'en-US' }))
          .withLlm(new OpenAI({ model: 'gpt-5-mini' }))
          .withTts(new OpenAITTS({ voice: 'alloy' }));
        ```

        Supported inferred preset models:

        - Deepgram STT: `nova-2`, `nova-3`
        - OpenAI LLM: `gpt-4o-mini`, `gpt-4.1-mini`, `gpt-5-nano`, `gpt-5-mini`
        - OpenAI TTS: `tts-1`
        - MiniMax TTS: `speech-2.6-turbo`, `speech-2.8-turbo`

        ### SayOptions

        | Field | Type | Description |
        |---|---|---|
        | `priority` | `SpeakPriority` | Priority of the message |
        | `interruptable` | `boolean` | Whether this message can be interrupted |

        ## Events

        | Event | Payload | When it fires |
        |---|---|---|
        | `started` | `{ agentId: string }` | Agent successfully joined the channel |
        | `stopped` | `{ agentId: string }` | Agent left the channel |
        | `error` | `Error` | An unrecoverable error occurred |

        ### Example: listening for events

        <!-- snippet: executable -->
        ```typescript
        import { AgoraClient, Area, Agent, OpenAI, ElevenLabsTTS, DeepgramSTT } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'event-demo', instructions: 'You are helpful.' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({ key: 'your-elevenlabs-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }));

        const session = agent.createSession(client, {
          channel: 'my-room',
          agentUid: '1',
          remoteUids: ['100'],
        });

        // Subscribe before starting
        session.on('started', ({ agentId }) => {
          console.log('Agent started:', agentId);
        });

        session.on('stopped', ({ agentId }) => {
          console.log('Agent stopped:', agentId);
        });

        session.on('error', (err) => {
          console.error('Session error:', err);
        });

        const agentId = await session.start();
        console.log('Running with agent ID:', agentId);

        // Later...
        await session.stop();
        ```

        ## Properties

        | Property | Type | Description |
        |---|---|---|
        | `status` | `"idle" \| "starting" \| "running" \| "stopping" \| "stopped" \| "error"` | Current state |
        | `id` | `string \| null` | Agent ID (available after `start()` resolves) |
        | `agent` | `Agent` | The agent configuration this session was created from |
        | `appId` | `string` | The App ID for this session |
        | `raw` | `AgentsClient` | Direct access to the Fern-generated `AgentsClient` |

        ### Using `session.raw`

        If the Agora API adds a new endpoint before the agentkit is updated, you can call it directly:

        <!-- snippet: fragment -->
        ```typescript
        await session.raw.someNewEndpoint({
          appid: session.appId,
          agentId: session.id!,
        });
        ```

        See [AgentSession Reference](../reference/session.md) for full TypeScript signatures.
      docs/concepts/vendors.md: |
        ---
        sidebar_position: 4
        title: Vendors
        description: Typed vendor classes for LLM, TTS, STT, MLLM, and Avatar providers.
        ---

        # Vendors

        Each vendor is a typed class that validates options at construction time and serializes to the wire format for the Agora API. Import all vendors from `agora-agents`.

        ## LLM vendors

        | Class | Provider | Key constructor params |
        |---|---|---|
        | `OpenAI` | OpenAI Chat Completions | `apiKey`, `model`, `url?`, `maxHistory?`, `greetingMessage?`, `failureMessage?` |
        | `AzureOpenAI` | Azure OpenAI | `apiKey`, `model`, `resourceName`, `deploymentName`, `apiVersion?` |
        | `Anthropic` | Anthropic Claude | `apiKey`, `model`, `url?`, `maxHistory?` |
        | `Gemini` | Google Gemini | `apiKey`, `model`, `url?`, `maxHistory?` |

        <!-- snippet: executable -->
        ```typescript
        import { OpenAI } from 'agora-agents';

        const llm = new OpenAI({
          apiKey: 'your-openai-key',
          model: 'gpt-4o-mini',
        });
        ```

        ## TTS vendors

        | Class | Provider | `sampleRate` options |
        |---|---|---|
        | `ElevenLabsTTS` | ElevenLabs | 16000, 22050, 24000, 44100 |
        | `MicrosoftTTS` | Azure Speech | 16000, 24000, 48000 |
        | `OpenAITTS` | OpenAI TTS | Fixed at 24000 |
        | `CartesiaTTS` | Cartesia | 8000, 16000, 22050, 24000, 44100, 48000 |
        | `GoogleTTS` | Google Cloud TTS | Not configurable via constructor |
        | `AmazonTTS` | Amazon Polly | Not configurable via constructor |
        | `HumeAITTS` | Hume AI | Not configurable via constructor |
        | `RimeTTS` | Rime | Not configurable via constructor |
        | `FishAudioTTS` | Fish Audio | Not configurable via constructor |
        | `MiniMaxTTS` | MiniMax | Not configurable via constructor |
        | `MurfTTS` | Murf | Not configurable via constructor |
        | `DeepgramTTS` | Deepgram | Configurable |
        | `SarvamTTS` | Sarvam AI | Not configurable via constructor |

        <!-- snippet: executable -->
        ```typescript
        import { ElevenLabsTTS } from 'agora-agents';

        const tts = new ElevenLabsTTS({
          key: 'your-elevenlabs-key',
          modelId: 'eleven_flash_v2_5',
          voiceId: 'your-voice-id',
          sampleRate: 24000,
        });
        ```

        The `sampleRate` is critical when using avatars. See [Avatar Integration](../guides/avatars.md) for details.

        ## STT vendors

        | Class | Provider | Key constructor params |
        |---|---|---|
        | `SpeechmaticsSTT` | Speechmatics | `apiKey`, `language` |
        | `DeepgramSTT` | Deepgram | `apiKey?`, `model?`, `language?`, `smartFormat?` |
        | `MicrosoftSTT` | Azure Speech | `key`, `region`, `language?` |
        | `OpenAISTT` | OpenAI Whisper | `apiKey`, `model?`, `language?` |
        | `GoogleSTT` | Google Speech | `apiKey`, `language?` |
        | `AmazonSTT` | Amazon Transcribe | `accessKey`, `secretKey`, `region`, `language?` |
        | `AssemblyAISTT` | AssemblyAI | `apiKey`, `language?` |
        | `AresSTT` | Agora ARES | `language?` |
        | `SarvamSTT` | Sarvam AI | `apiKey`, `language` |

        <!-- snippet: executable -->
        ```typescript
        import { DeepgramSTT } from 'agora-agents';

        const stt = new DeepgramSTT({
          apiKey: 'your-deepgram-key',
          model: 'nova-2',
          language: 'en-US',
        });
        ```

        ## MLLM vendors

        MLLM (Multimodal LLM) vendors handle audio end-to-end — no separate STT or TTS step. Call `agent.withMllm(vendor)` and MLLM mode is enabled automatically; no separate `advancedFeatures` flag is needed.

        | Class | Provider | Key constructor params |
        |---|---|---|
        | `OpenAIRealtime` | OpenAI Realtime API | `apiKey`, `model?`, `url?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |
        | `GeminiLive` | Google Gemini Live API | `apiKey`, `model`, `url?`, `voice?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |
        | `VertexAI` | Vertex AI Gemini Live | `model`, `url?`, `projectId`, `location`, `adcCredentialsString`, `voice?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |
        | `XaiGrok` | xAI Grok (`mllm.vendor`: `xai`) | `apiKey`, `url?`, `voice?`, `language?`, `sampleRate?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |

        > Future xAI **STT** and **TTS** vendors will be named `XaiSTT` and `XaiTTS` (cascading pipeline), not `XaiRealtime`. See workspace `docs/AGENTKIT-VENDOR-NAMING.md`.

        <!-- snippet: executable -->
        ```typescript
        import { OpenAIRealtime } from 'agora-agents';

        const mllm = new OpenAIRealtime({
          apiKey: 'your-openai-key',
          model: 'gpt-4o-realtime-preview',
          greetingMessage: 'Hello! Ready to chat.',
        });
        ```

        See [MLLM Flow Guide](../guides/mllm-flow.md) for full examples.

        ## Avatar vendors

        Avatars provide a visual representation for the agent. Several avatar vendors require a specific TTS sample rate — this is enforced at both compile time and runtime.

        > Avatars currently require the cascading ASR + LLM + TTS pipeline. They are not supported with MLLM (`OpenAIRealtime`, `GeminiLive`, `VertexAI`, `XaiGrok`); combining the two throws at `Agent.toProperties()` and `AgentSession.start()`.

        | Class | Provider | Required TTS sample rate |
        |---|---|---|
        | `LiveAvatarAvatar` | LiveAvatar (formerly HeyGen) | 24000 Hz |
        | `HeyGenAvatar` | HeyGen (deprecated, use `LiveAvatarAvatar`) | 24000 Hz |
        | `AkoolAvatar` | Akool | 16000 Hz |
        | `AnamAvatar` | Anam | Provider-defined |
        | `GenericAvatar` | Custom avatar provider | Provider-defined |

        See [Avatar Integration](../guides/avatars.md) for full examples and the sample-rate constraint details.

        For detailed constructor options for every vendor, see [Vendor Reference](../reference/vendors.md).
