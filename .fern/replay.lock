      scripts/rename-to-esm-files.js: |
        #!/usr/bin/env node

        const fs = require("fs").promises;
        const path = require("path");

        const extensionMap = {
            ".js": ".mjs",
            ".d.ts": ".d.mts",
        };
        const oldExtensions = Object.keys(extensionMap);

        async function findFiles(rootPath) {
            const files = [];

            async function scan(directory) {
                const entries = await fs.readdir(directory, { withFileTypes: true });

                for (const entry of entries) {
                    const fullPath = path.join(directory, entry.name);

                    if (entry.isDirectory()) {
                        if (entry.name !== "node_modules" && !entry.name.startsWith(".")) {
                            await scan(fullPath);
                        }
                    } else if (entry.isFile()) {
                        if (oldExtensions.some((ext) => entry.name.endsWith(ext))) {
                            files.push(fullPath);
                        }
                    }
                }
            }

            await scan(rootPath);
            return files;
        }

        async function updateFiles(files) {
            const updatedFiles = [];
            for (const file of files) {
                const updated = await updateFileContents(file);
                updatedFiles.push(updated);
            }

            console.log(`Updated imports in ${updatedFiles.length} files.`);
        }

        async function updateFileContents(file) {
            const content = await fs.readFile(file, "utf8");

            let newContent = content;
            const replaceExtension = (specifier) => {
                for (const [oldExt, newExt] of Object.entries(extensionMap)) {
                    if (specifier.endsWith(oldExt)) {
                        return specifier.slice(0, -oldExt.length) + newExt;
                    }
                }
                return specifier;
            };

            // Handle static imports/exports, including multiline export blocks.
            newContent = newContent.replace(
                /(from\s*['"])(\.{1,2}\/[^'"]+?)(\.js|\.d\.ts)(['"])/g,
                (_match, prefix, specifier, extension, suffix) => `${prefix}${replaceExtension(`${specifier}${extension}`)}${suffix}`,
            );

            // Handle side-effect imports.
            newContent = newContent.replace(
                /(import\s*['"])(\.{1,2}\/[^'"]+?)(\.js|\.d\.ts)(['"])/g,
                (_match, prefix, specifier, extension, suffix) => `${prefix}${replaceExtension(`${specifier}${extension}`)}${suffix}`,
            );

            // Handle dynamic imports.
            newContent = newContent.replace(
                /(import\s*\(\s*['"])(\.{1,2}\/[^'"]+?)(\.js|\.d\.ts)(['"]\s*\))/g,
                (_match, prefix, specifier, extension, suffix) => `${prefix}${replaceExtension(`${specifier}${extension}`)}${suffix}`,
            );

            if (content !== newContent) {
                await fs.writeFile(file, newContent, "utf8");
                return true;
            }
            return false;
        }

        async function renameFiles(files) {
            let counter = 0;
            for (const file of files) {
                const ext = oldExtensions.find((ext) => file.endsWith(ext));
                const newExt = extensionMap[ext];

                if (newExt) {
                    const newPath = file.slice(0, -ext.length) + newExt;
                    await fs.rename(file, newPath);
                    counter++;
                }
            }

            console.log(`Renamed ${counter} files.`);
        }

        async function main() {
            try {
                const targetDir = process.argv[2];
                if (!targetDir) {
                    console.error("Please provide a target directory");
                    process.exit(1);
                }

                const targetPath = path.resolve(targetDir);
                const targetStats = await fs.stat(targetPath);

                if (!targetStats.isDirectory()) {
                    console.error("The provided path is not a directory");
                    process.exit(1);
                }

                console.log(`Scanning directory: ${targetDir}`);

                const files = await findFiles(targetDir);

                if (files.length === 0) {
                    console.log("No matching files found.");
                    process.exit(0);
                }

                console.log(`Found ${files.length} files.`);
                await updateFiles(files);
                await renameFiles(files);
                console.log("\nDone!");
            } catch (error) {
                console.error("An error occurred:", error.message);
                process.exit(1);
            }
        }

        main();
      scripts/verify-esm-imports.js: |
        #!/usr/bin/env node

        const fs = require("fs").promises;
        const path = require("path");

        const relativeJsSpecifierPattern =
            /(?:from\s*['"]|import\s*['"]|import\s*\(\s*['"])(\.{1,2}\/[^'"]+\.js)(?:['"])/g;

        async function findFiles(rootPath) {
            const files = [];

            async function scan(directory) {
                const entries = await fs.readdir(directory, { withFileTypes: true });

                for (const entry of entries) {
                    const fullPath = path.join(directory, entry.name);

                    if (entry.isDirectory()) {
                        if (entry.name !== "node_modules" && !entry.name.startsWith(".")) {
                            await scan(fullPath);
                        }
                    } else if (entry.isFile() && (entry.name.endsWith(".mjs") || entry.name.endsWith(".d.mts"))) {
                        files.push(fullPath);
                    }
                }
            }

            await scan(rootPath);
            return files;
        }

        async function main() {
            const targetDir = process.argv[2];
            if (!targetDir) {
                console.error("Please provide a target directory");
                process.exit(1);
            }

            const files = await findFiles(path.resolve(targetDir));
            const failures = [];

            for (const file of files) {
                const content = await fs.readFile(file, "utf8");
                const matches = [...content.matchAll(relativeJsSpecifierPattern)];

                for (const match of matches) {
                    failures.push(`${path.relative(process.cwd(), file)}: ${match[1]}`);
                }
            }

            if (failures.length > 0) {
                console.error("ESM output contains relative .js imports:");
                for (const failure of failures) {
                    console.error(`  ${failure}`);
                }
                process.exit(1);
            }

            console.log(`Verified ${files.length} ESM files.`);
        }

        main().catch((error) => {
            console.error("An error occurred:", error.message);
            process.exit(1);
        });
