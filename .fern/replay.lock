                }

                if (!this._agentId) {
                    throw new Error("No agent ID available");
                }

                this._status = "stopping";

                try {
                    await this._client.agents.stop(
                        {
                            appid: this._appId,
                            agentId: this._agentId,
                        },
                        { headers: this._convoAIHeaders() },
                    );

                    this._status = "stopped";
                    this._emit("stopped", { agentId: this._agentId });
