      docs/concepts/session.md: |
        ---
        sidebar_position: 3
        title: AgentSession
        description: Manage the full lifecycle of a running Agora Conversational AI agent.
        ---

        # AgentSession

        `AgentSession` manages the full lifecycle of a running agent — from starting to stopping, with events and interaction methods in between.

        Create a session via [`agent.createSession()`](./agent.md):

        <!-- snippet: fragment -->
        ```typescript
        const session = agent.createSession(client, {
          channel: 'my-room',
          agentUid: '1',
          remoteUids: ['100'],
        });
        ```

        Presets are configured at session creation time when you use them explicitly. Most applications should configure vendors on the `Agent` builder instead — see [Quick Start](../getting-started/quick-start.md).

        ## State machine

        A session progresses through these states:

        ```
        idle ──► starting ──► running ──► stopping ──► stopped
                                 │
                                 ▼
                               error
        ```

        | State | Meaning |
        |---|---|
        | `idle` | Session created but not yet started |
        | `starting` | `start()` called; waiting for the API response |
        | `running` | Agent is active in the channel; you can call `say()`, `interrupt()`, `update()` |
        | `stopping` | `stop()` called; waiting for the agent to leave |
        | `stopped` | Agent has left the channel; session is finished |
        | `error` | An unrecoverable error occurred during `start()` or `stop()` |

        Read the current state with `session.status`.

        ## Methods

        All interaction methods require the session to be in the `running` state.

        | Method | Returns | Description |
        |---|---|---|
        | `start()` | `Promise<string>` | Start the agent. Transitions `idle → starting → running`. Returns the `agentId`. |
        | `stop()` | `Promise<void>` | Stop the agent. Transitions `running → stopping → stopped`. Handles already-stopped agents gracefully. |
        | `say(text, options?)` | `Promise<void>` | Instruct the agent to speak `text`. Optional `priority` and `interruptable` fields. |
        | `interrupt()` | `Promise<void>` | Interrupt the agent's current speech. |
        | `update(config)` | `Promise<void>` | Update the agent configuration mid-session (LLM params, TTS, etc.). |
        | `getHistory()` | `Promise<ConversationHistory>` | Fetch conversation history for this session. |
        | `getInfo()` | `Promise<SessionInfo>` | Fetch current agent metadata. |
        | `on(event, handler)` | `void` | Subscribe to a session event. |
        | `off(event, handler)` | `void` | Unsubscribe from a session event. |

        ## Agora-managed models and BYOK

        When you omit credentials for supported Agora-managed models on the builder, AgentKit sends the matching managed-model configuration at session start. Pass your own vendor API keys when you need BYOK.

        <!-- snippet: fragment -->
        ```typescript
        const agent = new Agent({ instructions: 'Be concise.' })
          .withStt(new DeepgramSTT({ model: 'nova-3', language: 'en-US' }))
          .withLlm(new OpenAI({ model: 'gpt-4o-mini' }))
          .withTts(new OpenAITTS({ voice: 'alloy' }));
        ```

        For explicit feature-flag preset IDs and the full list of Agora-managed models, see [AgentSession Reference](../reference/session.md).

        ### SayOptions

        | Field | Type | Description |
        |---|---|---|
        | `priority` | `SpeakPriority` | Priority of the message |
        | `interruptable` | `boolean` | Whether this message can be interrupted |

        ## Events

        | Event | Payload | When it fires |
        |---|---|---|
        | `started` | `{ agentId: string }` | Agent successfully joined the channel |
        | `stopped` | `{ agentId: string }` | Agent left the channel |
        | `error` | `Error` | An unrecoverable error occurred |

        ### Example: listening for events

        <!-- snippet: executable -->
        ```typescript
        import { AgoraClient, Area, Agent, OpenAI, ElevenLabsTTS, DeepgramSTT } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ name: 'event-demo', instructions: 'You are helpful.' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({ key: 'your-elevenlabs-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }));

        const session = agent.createSession(client, {
          channel: 'my-room',
          agentUid: '1',
          remoteUids: ['100'],
        });

        // Subscribe before starting
        session.on('started', ({ agentId }) => {
          console.log('Agent started:', agentId);
        });

        session.on('stopped', ({ agentId }) => {
          console.log('Agent stopped:', agentId);
        });

        session.on('error', (err) => {
          console.error('Session error:', err);
        });

        const agentId = await session.start();
        console.log('Running with agent ID:', agentId);

        // Later...
        await session.stop();
        ```

        ## Properties

        | Property | Type | Description |
        |---|---|---|
        | `status` | `"idle" \| "starting" \| "running" \| "stopping" \| "stopped" \| "error"` | Current state |
        | `id` | `string \| null` | Agent ID (available after `start()` resolves) |
        | `agent` | `Agent` | The agent configuration this session was created from |
        | `appId` | `string` | The App ID for this session |
        | `raw` | `AgentsClient` | Direct access to the Fern-generated `AgentsClient` |

        ### Using `session.raw`

        If the Agora API adds a new endpoint before the agentkit is updated, you can call it directly:

        <!-- snippet: fragment -->
        ```typescript
        await session.raw.someNewEndpoint({
          appid: session.appId,
          agentId: session.id!,
        });
        ```

        See [AgentSession Reference](../reference/session.md) for full TypeScript signatures.
      docs/getting-started/authentication.md: |
        ---
        sidebar_position: 2
        title: Authentication
        description: Configure AgoraClient with app credentials and understand other supported auth modes.
        ---

        # Authentication

        Create `AgoraClient` with `appId` and `appCertificate` only. The SDK mints a fresh ConvoAI REST token for each API call and generates the RTC join token when the session starts.

        ## App credentials

        ```typescript
        import { Agent, AgoraClient, Area, DeepgramSTT, OpenAI, MiniMaxTTS } from 'agora-agents';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
        });

        const agent = new Agent({ instructions: 'Be concise.' })
          .withStt(new DeepgramSTT({ model: 'nova-3', language: 'en-US' }))
          .withLlm(new OpenAI({ model: 'gpt-4o-mini' }))
          .withTts(new MiniMaxTTS({ model: 'speech_2_6_turbo', voiceId: 'English_captivating_female1' }));

        const session = agent.createSession(client, {
          channel: 'room-123',
          agentUid: '1',
          remoteUids: ['100'],
        });
        ```

        ## Why app credentials

        - Fresh short-lived tokens per API call instead of reusing long-lived credentials
        - No Customer ID / Customer Secret in request headers
        - No manual REST or RTC token provisioning in application code

        ## Inspecting auth mode

        ```typescript
        console.log(client.authMode); // "app-credentials"
        ```

        ## Legacy auth modes

        The generated client still supports pre-minted REST tokens and HTTP Basic Auth for legacy integrations. Do not use those modes for new session integrations. Use app credentials so AgentKit can mint short-lived ConvoAI REST auth and RTC join tokens for each session.
      docs/guides/low-level-api.md: |
        ---
        sidebar_position: 9
        title: Low-Level API
        description: Use generated clients for escape-hatch APIs while keeping agent sessions on AgentKit.
        ---

        # Low-Level API

        Use the `Agent` builder and `AgentSession` for conversational agent starts. That path generates ConvoAI REST auth and RTC join tokens from `appId` and `appCertificate`, so application code does not need prebuilt REST tokens, RTC tokens, Customer ID, or Customer Secret.

        Generated clients are still available for API surface that AgentKit does not wrap yet, such as telephony and phone-number management.

        ## Client setup

        ```typescript
        import { AgoraClient, Area } from "agora-agents";

        const client = new AgoraClient({
          area: Area.US,
          appId: "your-app-id",
          appCertificate: "your-app-certificate",
        });
        ```

        ## Raw telephony and phone-number APIs

        AgentKit focuses on realtime agent session helpers. Use generated clients for operational APIs:

        - `client.telephony` for call status and hangup operations
        - `client.phoneNumbers` for phone-number list, create, retrieve, update, and delete operations

        ```typescript
        const calls = await client.telephony.list({
          appid: client.appId,
          type: "sip",
        });

        for (const call of calls.data) {
          console.log(call.id, call.state);
        }
        ```

        ## Direct agent APIs

        `client.agents` exposes the generated REST surface for advanced integrations. Prefer `agent.createSession(...).start()` for new session starts because it handles auth, token generation, vendor serialization, lifecycle state, and avatar enrichment.

        If you need an endpoint that is not wrapped by `AgentSession`, use `session.raw` after creating the session:

        ```typescript
        const info = await session.raw.get({
          appid: session.appId,
          agentId: session.id!,
        });
        ```

        You must pass `appid` and `agentId` manually when using generated raw methods.
      docs/reference/agent.md: |
        ---
        sidebar_position: 2
        title: Agent
        description: Full API reference for the Agent builder class.
        ---

        # Agent Reference

        <!-- snippet: fragment -->
        ```typescript
        import { Agent } from 'agora-agents';
        ```

        ## Constructor

        <!-- snippet: fragment -->
        ```typescript
        new Agent<TTSSampleRate extends number = number>(options?: AgentOptions)
        ```

        ### AgentOptions

        | Option | Type | Default | Description |
        |---|---|---|---|
        | `name` | `string` | `undefined` | Agent name (used as default session name) |
        | `instructions` | `string` | `undefined` | System prompt injected as a system message to the LLM |
        | `greeting` | `string` | `undefined` | First message spoken when the session starts |
        | `failureMessage` | `string` | `undefined` | Message spoken when an LLM call fails |
        | `maxHistory` | `number` | `undefined` | Max conversation turns kept in standard LLM context; does not apply to MLLM |
        | `turnDetection` | `TurnDetectionConfig` | `undefined` | Voice activity detection settings |
        | `interruption` | `InterruptionConfig` | `undefined` | Unified interruption control settings |
        | `sal` | `SalConfig` | `undefined` | Selective Attention Locking configuration |
        | `avatar` | `AvatarConfig` | `undefined` | Avatar configuration |
        | `advancedFeatures` | `AdvancedFeatures` | `undefined` | Enable MLLM mode, AI-VAD, etc. |
        | `parameters` | `SessionParams` | `undefined` | Session parameters (silence config, farewell config) |
        | `geofence` | `GeofenceConfig` | `undefined` | Regional access restriction |
        | `labels` | `Labels` | `undefined` | Custom key-value labels (returned in callbacks) |
        | `rtc` | `RtcConfig` | `undefined` | RTC media encryption |
        | `fillerWords` | `FillerWordsConfig` | `undefined` | Filler words while waiting for LLM |

        ## Builder methods

        All methods return a **new** `Agent` instance. The original is never modified.

        ### `withLlm(vendor: BaseLLM): Agent<TTSSampleRate>`

        Set the LLM vendor. Pass an instance of `OpenAI`, `AzureOpenAI`, `Anthropic`, or `Gemini`.

        ### `withTts<SR extends number>(vendor: BaseTTS<SR>): Agent<SR>`

        Set the TTS vendor. The sample rate type `SR` is captured and tracked for avatar compatibility.

        ### `withStt(vendor: BaseSTT): Agent<TTSSampleRate>`

        Set the STT vendor. Pass an instance of any STT class (`DeepgramSTT`, `SpeechmaticsSTT`, etc.).

        ### `withMllm(vendor: BaseMLLM): Agent<TTSSampleRate>`

        Set the MLLM vendor for multimodal mode. Pass `OpenAIRealtime`, `GeminiLive`, `VertexAI`, or `XaiGrok`. Calling `withMllm()` automatically sets `mllm.enable = true`. MLLM mode does not require `withTts()` / `withLlm()` / `withStt()`.

        > Avatars are only supported with the cascading ASR + LLM + TTS pipeline. Combining `withMllm()` with `withAvatar()` throws at `toProperties()` and `session.start()`.

        ### `withAvatar<RequiredSR extends number>(this: Agent<RequiredSR>, vendor: BaseAvatar<RequiredSR>): Agent<RequiredSR>`

        Set the avatar vendor. The `this` constraint enforces that the Agent's TTS sample rate matches the avatar's required rate at compile time. Requires the cascading ASR + LLM + TTS pipeline; avatars are not supported with MLLM.

        ### `withTurnDetection(config: TurnDetectionConfig): Agent<TTSSampleRate>`

        Configure cascading-flow turn detection. Use `config.start_of_speech` and `config.end_of_speech` for SOS/EOS detection. Use `withInterruption()` for interruption behavior and MLLM vendor `turnDetection` for MLLM turn detection.

        ### `withInterruption(config: InterruptionConfig): Agent<TTSSampleRate>`

        Configure unified interruption behavior using the top-level `interruption` object. Use this for `start_of_speech` and `keywords` interruption modes.

        ### `withInstructions(instructions: string): Agent<TTSSampleRate>`

        Override the system prompt.

        ### `withGreeting(greeting: string): Agent<TTSSampleRate>`

        Override the greeting message.

        ### `withName(name: string): Agent<TTSSampleRate>`

        Override the agent name.

        ### `withSal(config: SalConfig): Agent<TTSSampleRate>`

        Set SAL (Selective Attention Locking) configuration.

        ### `withAdvancedFeatures(features: AdvancedFeatures): Agent<TTSSampleRate>`

        Set advanced features (e.g. `enable_rtm`).

        ### `withTools(enabled = true): Agent<TTSSampleRate>`

        Enable or disable MCP tool invocation by setting `advanced_features.enable_tools`.

        ### `withParameters(parameters: SessionParams): Agent<TTSSampleRate>`

        Set session parameters (silence config, farewell config, data channel, etc.).

        ### `withAudioScenario(audioScenario: ParametersAudioScenario): Agent<TTSSampleRate>`

        Set `parameters.audio_scenario`. Use the exported `AudioScenario` constants for discoverability:

        <!-- snippet: fragment -->
        ```typescript
        agent.withAudioScenario(AudioScenario.Aiserver)
        ```

        ### `withFailureMessage(message: string): Agent<TTSSampleRate>`

        Set the message spoken via TTS when the LLM call fails.

        ### `withMaxHistory(maxHistory: number): Agent<TTSSampleRate>`

        Set the maximum conversation history length for the standard LLM pipeline. The v2.7 MLLM core schema does not expose a `max_history` field.

        ### `withGeofence(geofence: GeofenceConfig): Agent<TTSSampleRate>`

        Set geofence configuration (restricts backend server regions).

        ### `withLabels(labels: Labels): Agent<TTSSampleRate>`

        Set custom labels (key-value pairs returned in notification callbacks).

        ### `withRtc(rtc: RtcConfig): Agent<TTSSampleRate>`

        Set RTC configuration.

        ### `withFillerWords(fillerWords: FillerWordsConfig): Agent<TTSSampleRate>`

        Set filler words configuration (played while waiting for LLM response).

        ## Getter properties

        | Property | Type | Description |
        |---|---|---|
        | `name` | `string \| undefined` | The agent name |
        | `llm` | `LlmConfig \| undefined` | LLM config (set via `withLlm`) |
        | `tts` | `TtsConfig \| undefined` | TTS config (set via `withTts`) |
        | `stt` | `SttConfig \| undefined` | STT config (set via `withStt`) |
        | `mllm` | `MllmConfig \| undefined` | MLLM config (set via `withMllm`) |
        | `avatar` | `AvatarConfig \| undefined` | Avatar config (set via `withAvatar`) |
        | `turnDetection` | `TurnDetectionConfig \| undefined` | Turn detection config |
        | `interruption` | `InterruptionConfig \| undefined` | Interruption config |
        | `instructions` | `string \| undefined` | System prompt |
        | `greeting` | `string \| undefined` | Greeting message |
        | `failureMessage` | `string \| undefined` | Message spoken when LLM fails |
        | `maxHistory` | `number \| undefined` | Max conversation history length for the standard LLM pipeline |
        | `sal` | `SalConfig \| undefined` | SAL configuration |
        | `advancedFeatures` | `AdvancedFeatures \| undefined` | Advanced features |
        | `parameters` | `SessionParams \| undefined` | Session parameters |
        | `geofence` | `GeofenceConfig \| undefined` | Geofence configuration |
        | `labels` | `Labels \| undefined` | Custom labels |
        | `rtc` | `RtcConfig \| undefined` | RTC configuration |
        | `fillerWords` | `FillerWordsConfig \| undefined` | Filler words configuration |
        | `config` | `AgentOptions` | Full read-only configuration snapshot |

        ## `createSession(client, options): AgentSession`

        Creates a new `AgentSession` bound to the given client and channel.

        <!-- snippet: fragment -->
        ```typescript
        createSession(
          client: AgoraClient & { readonly appId: string; readonly appCertificate?: string },
          options: SessionOptions,
        ): AgentSession
        ```

        ### SessionOptions

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `channel` | `string` | Yes | Channel name to join |
        | `agentUid` | `string` | Yes | The agent's RTC UID |
        | `remoteUids` | `string[]` | Yes | Remote user UIDs to subscribe to |
        | `name` | `string` | No | Session name (defaults to agent name or `agent-{timestamp}`) |
        | `token` | `string` | No | Pre-built RTC+RTM token (omit to auto-generate) |
        | `expiresIn` | `number` | No | Token lifetime in seconds (default: `86400` = 24 h, Agora max). Only applies when the token is auto-generated. Use `ExpiresIn.hours()` or `ExpiresIn.minutes()` for clarity. Valid range: 1–86400. |
        | `idleTimeout` | `number` | No | Seconds before auto-exit if no audio (0 = disabled) |
        | `enableStringUid` | `boolean` | No | Use string UIDs instead of numeric |
        | `preset` | `string \| AgentPreset[]` | No | Advanced feature-flag presets. Use only when Agora provides a specific preset ID for your project. |
        | `pipelineId` | `string` | No | Published AI Studio pipeline ID to use as the base configuration |
        | `debug` | `boolean` | No | Log API requests to console |
        | `warn` | `(message: string) => void` | No | Custom warning logger; pass a no-op to silence warnings |

        `preset` is session-scoped because the underlying Agora start/join API applies feature flags per session, not per reusable `Agent` definition. Most applications should leave it unset.

        When you omit credentials for supported Agora-managed models, AgentKit sends the matching managed-model configuration automatically:

        - Deepgram STT: `nova-2`, `nova-3`
        - OpenAI LLM: `gpt-4o-mini`, `gpt-4.1-mini`, `gpt-5-nano`, `gpt-5-mini`
        - OpenAI TTS: `tts-1`
        - MiniMax TTS: `speech-2.6-turbo`, `speech-2.8-turbo`

        If you provide your own vendor API key for those same models, AgentKit keeps the request in BYOK mode.

        ## `toProperties(opts): StartAgentsRequest.Properties`

        Low-level method to convert the agent config to the Fern request format. Used internally by `AgentSession.start()`. You typically don't need to call this directly unless building custom request bodies.

        ## Type aliases

        Public aliases over Fern-generated types include `LlmConfig`, `SttConfig`, `AsrConfig` (= `SttConfig`), `MllmConfig`, `AvatarConfig`, session/conversation types, and think types (`ThinkOnListeningAction`, etc.).

        Think value constants: `ThinkOnListeningActionInject`, `ThinkOnListeningActionInterrupt`, `ThinkOnListeningActionIgnore`, `ThinkOnThinkingActionInterrupt`, `ThinkOnThinkingActionIgnore`, `ThinkOnSpeakingActionInterrupt`, `ThinkOnSpeakingActionIgnore`.
