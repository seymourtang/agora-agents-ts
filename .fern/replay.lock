        }

        export function inferLlmPreset(llm?: Agora.Llm): LlmInference | undefined {
            if (!llm || llm.api_key) return undefined;
            if (llm.vendor && llm.vendor !== "openai") return undefined;
            if (llm.url && llm.url !== OPENAI_CHAT_COMPLETIONS_URL) return undefined;
            const preset = openAiModelToPreset[normalizeModelName(llm.params?.model) ?? ""];
            if (!preset) return undefined;
            return {
                category: "llm",
                preset,
                stripModel: true,
                stripDefaultUrl: true,
            };
        }

        export function inferTtsPreset(tts?: Agora.Tts): TtsInference | undefined {
            if (!tts) return undefined;
            if (tts.vendor === "openai") {
                if ((tts.params as unknown as Record<string, unknown> | undefined)?.api_key) return undefined;
                const model = normalizeModelName(tts.params?.model) ?? "tts-1";
                if (model !== "tts-1") return undefined;
                return {
                    category: "tts",
                    preset: AgentPresets.tts.openaiTts1,
                    vendor: "openai",
                    stripModel: true,
                };
            }
            if (tts.vendor === "minimax") {
                if (tts.params?.key) return undefined;
                const preset = minimaxModelToPreset[normalizeModelName(tts.params?.model) ?? ""];
                if (!preset) return undefined;
                return {
                    category: "tts",
                    preset,
                    vendor: "minimax",
                    stripModel: true,
                };
            }
            return undefined;
        }

        function stripInferredPresetFields(
            properties: Agora.StartAgentsRequest.Properties,
            inferred: InferenceMap,
        ): Agora.StartAgentsRequest.Properties {
            let asr = properties.asr;
            const asrInference = inferred.asr;
            if (asr && asrInference) {
                asr = {
                    ...asr,
                    params: omitUndefinedKeys({
                        ...asr.params,
                        api_key: undefined,
                        model: asrInference.stripModel ? undefined : asr.params?.model,
                    }),
                } as Agora.Asr;
            }

            let llm = properties.llm;
            const llmInference = inferred.llm;
            if (llm && llmInference) {
                const { url: llmUrl, ...llmRest } = llm;
                llm = {
                    ...llmRest,
                    api_key: undefined,
                    url: llmInference.stripDefaultUrl ? undefined : llmUrl,
                    params: omitUndefinedKeys({
                        ...llm.params,
                        model: llmInference.stripModel ? undefined : llm.params?.model,
                    }),
                } as unknown as Agora.Llm;
            }

            let tts = properties.tts;
            const ttsInference = inferred.tts;
            if (tts && ttsInference) {
                if (ttsInference.vendor === "openai" && tts.vendor === "openai") {
                    tts = {
                        ...tts,
                        params: omitUndefinedKeys({
                            ...tts.params,
                            api_key: undefined,
                            model: ttsInference.stripModel ? undefined : tts.params?.model,
                        }) as unknown as typeof tts.params,
                    };
                } else if (ttsInference.vendor === "minimax" && tts.vendor === "minimax") {
                    tts = {
                        ...tts,
                        params: omitUndefinedKeys({
                            ...tts.params,
                            key: undefined,
                            group_id: undefined,
                            url: undefined,
                            model: ttsInference.stripModel ? undefined : tts.params?.model,
                        }) as unknown as typeof tts.params,
                    };
                }
            }

            return {
                ...properties,
                ...(asr && { asr }),
                ...(llm && { llm }),
                ...(tts && { tts }),
            };
        }

        export function normalizePresetInput(preset?: PresetInput | readonly string[]): string | undefined {
            const entries = parsePresetInput(preset);
            return entries.length > 0 ? entries.join(",") : undefined;
        }

        export function resolveSessionPresets(args: {
            preset?: PresetInput;
            properties: Agora.StartAgentsRequest.Properties;
        }): { preset?: string; properties: Agora.StartAgentsRequest.Properties } {
            const explicitPresets = parsePresetInput(args.preset);
            const explicitCategories = new Set(explicitPresets.map(getPresetCategory).filter(Boolean));
            const inferred: InferenceMap = {};

            if (!explicitCategories.has("asr")) {
                const result = inferAsrPreset(args.properties.asr);
                if (result) inferred.asr = result;
            }
            if (!explicitCategories.has("llm")) {
                const result = inferLlmPreset(args.properties.llm);
                if (result) inferred.llm = result;
            }
            if (!explicitCategories.has("tts")) {
                const result = inferTtsPreset(args.properties.tts);
                if (result) inferred.tts = result;
            }
            const inferredPresets = Object.values(inferred).map((result) => result.preset);

            return {
                preset: normalizePresetInput([...explicitPresets, ...inferredPresets]),
                properties: stripInferredPresetFields(args.properties, inferred),
            };
        }
      tests/unit/agentkit/pipeline-id.test.ts: |
        import { describe, expect, test, vi } from "vitest";
        import { Agent } from "../../../src/agentkit/Agent.js";
        import { OpenAI } from "../../../src/agentkit/vendors/llm.js";
        import { OpenAITTS } from "../../../src/agentkit/vendors/tts.js";
        import type * as Agora from "../../../src/api/index.js";
        import type { AgoraClient } from "../../../src/Client.js";

        function createClient() {
            const start = vi.fn(async (_request: Agora.StartAgentsRequest) => ({
                agent_id: "agent-id",
                create_ts: 1737111452,
                status: "RUNNING" as const,
            }));

            const client = {
                appId: "appid",
                agents: { start },
            } as unknown as AgoraClient & { readonly appId: string };

            return { client, start };
        }

        function getStartRequest(start: ReturnType<typeof createClient>["start"]): Agora.StartAgentsRequest {
            expect(start).toHaveBeenCalledTimes(1);
            const call = start.mock.calls[0];
            expect(call).toBeDefined();
            return call[0];
        }

        describe("Agent pipelineId", () => {
            test("agent-level pipelineId is sent as top-level pipeline_id", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "studio-pipeline-id" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = getStartRequest(start);
                expect(request).toMatchObject({
                    appid: "appid",
                    name: "support",
                    pipeline_id: "studio-pipeline-id",
                    properties: {
                        channel: "channel",
                        token: "token",
                        agent_rtc_uid: "1",
                        remote_rtc_uids: ["100"],
                    },
                });
            });

            test("session-level pipelineId overrides agent-level pipelineId", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "agent-pipeline" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                    pipelineId: "session-pipeline",
                });

                await session.start();

                expect(getStartRequest(start).pipeline_id).toBe("session-pipeline");
            });

            test("agent-level pipelineId skips missing ASR/LLM/TTS vendor validation", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "studio-pipeline-id" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await expect(session.start()).resolves.toBe("agent-id");
                expect(start).toHaveBeenCalledTimes(1);
                expect(getStartRequest(start).properties).not.toHaveProperty("asr");
                expect(getStartRequest(start).properties).not.toHaveProperty("llm");
                expect(getStartRequest(start).properties).not.toHaveProperty("tts");
            });

            test("pipelineId allows a single LLM override without TTS or ASR", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "studio-pipeline-id" }).withLlm(
                    new OpenAI({
                        apiKey: "openai-key",
                        url: "https://api.openai.com/v1/chat/completions",
                        model: "gpt-4o",
                    }),
                );

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = getStartRequest(start);
                expect(request.properties).not.toHaveProperty("asr");
                expect(request.properties).not.toHaveProperty("tts");
                expect(request.properties.llm?.api_key).toBe("openai-key");
                expect(request.properties.llm?.params?.model).toBe("gpt-4o");
            });

            test("pipelineId allows multiple overrides without ASR", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "studio-pipeline-id" })
                    .withLlm(
                        new OpenAI({
                            apiKey: "openai-key",
                            url: "https://api.openai.com/v1/chat/completions",
                            model: "gpt-4o",
                        }),
                    )
                    .withTts(
                        new OpenAITTS({
                            apiKey: "tts-key",
                            baseUrl: "https://api.openai.com/v1/audio/speech",
                            model: "tts-1-hd",
                            voice: "alloy",
                        }),
                    );

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = getStartRequest(start);
                expect(request.properties).not.toHaveProperty("asr");
                expect(request.properties.llm?.api_key).toBe("openai-key");
                expect(request.properties.tts?.vendor).toBe("openai");
                expect(request.properties.tts?.params?.api_key).toBe("tts-key");
            });

            test("pipeline_id is not sent inside properties", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "studio-pipeline-id" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = getStartRequest(start);
                expect(request.pipeline_id).toBe("studio-pipeline-id");
                expect(request.properties).not.toHaveProperty("pipeline_id");
            });

            test("fluent builder clones preserve pipelineId", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support", pipelineId: "studio-pipeline-id" }).withAdvancedFeatures({
                    enable_rtm: true,
                });

                expect(agent.pipelineId).toBe("studio-pipeline-id");

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = getStartRequest(start);
                expect(request.pipeline_id).toBe("studio-pipeline-id");
                expect(request.properties.advanced_features).toEqual({ enable_rtm: true });
            });
        });
      tests/unit/agentkit/preset-validation.test.ts: |
        import { describe, expect, test, vi } from "vitest";
        import { Agent } from "../../../src/agentkit/Agent.js";
        import { DeepgramSTT } from "../../../src/agentkit/vendors/stt.js";
        import { MiniMaxTTS, OpenAITTS } from "../../../src/agentkit/vendors/tts.js";
        import { OpenAI } from "../../../src/agentkit/vendors/llm.js";
        import type * as Agora from "../../../src/api/index.js";
        import type { AgoraClient } from "../../../src/Client.js";

        function createClient() {
            const start = vi.fn(async (_request: Agora.StartAgentsRequest) => ({
                agent_id: "agent-id",
                create_ts: 1737111452,
                status: "RUNNING" as const,
            }));

            const client = {
                appId: "appid",
                agents: { start },
            } as unknown as AgoraClient & { readonly appId: string };

            return { client, start };
        }

        describe("Agent preset validation", () => {
            test("explicit ASR preset still requires LLM and TTS", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                    preset: "deepgram_nova_3",
                });

                await expect(session.start()).rejects.toThrow("TTS configuration is required");
                expect(start).not.toHaveBeenCalled();
            });

            test("explicit LLM preset still requires TTS", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                    preset: "openai_gpt_4o_mini",
                });

                await expect(session.start()).rejects.toThrow("TTS configuration is required");
                expect(start).not.toHaveBeenCalled();
            });

            test("explicit TTS preset still requires LLM", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support" });

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                    preset: "openai_tts_1",
                });

                await expect(session.start()).rejects.toThrow("LLM configuration is required");
                expect(start).not.toHaveBeenCalled();
            });

            test("infers ASR, LLM, and TTS presets without skipping unrelated validation", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support" })
                    .withStt(new DeepgramSTT({ model: "nova-3", language: "en-US" }))
                    .withLlm(new OpenAI({ model: "gpt-4o-mini" }))
                    .withTts(new OpenAITTS({ voice: "alloy" }));

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = start.mock.calls[0]?.[0];
                expect(request?.preset).toBe("deepgram_nova_3,openai_gpt_4o_mini,openai_tts_1");
                expect(request?.properties.asr?.params).toEqual({ language: "en-US" });
                expect(request?.properties.tts?.params).toEqual({ voice: "alloy" });
            });

            test("infers hyphenated MiniMax managed preset model", async () => {
                const { client, start } = createClient();
                const agent = new Agent({ name: "support" })
                    .withLlm(new OpenAI({ model: "gpt-4o-mini" }))
                    .withTts(new MiniMaxTTS({ model: "speech-2.6-turbo", voiceId: "English_captivating_female1" }));

                const session = agent.createSession(client, {
                    channel: "channel",
                    token: "token",
                    agentUid: "1",
                    remoteUids: ["100"],
                });

                await session.start();

                const request = start.mock.calls[0]?.[0];
                expect(request?.preset).toBe("openai_gpt_4o_mini,minimax_speech_2_6_turbo");
                expect(request?.properties.tts?.params).toEqual({
                    voice_setting: { voice_id: "English_captivating_female1" },
                });
            });

            test("speech-02-turbo requires BYOK", () => {
                expect(() => new MiniMaxTTS({ model: "speech-02-turbo", voiceId: "English_captivating_female1" })).toThrow(
                    "MiniMaxTTS requires key unless using a supported Agora-managed model",
                );
            });
        });
      tests/unit/agentkit/tts-vendors.test.ts: |
        import { describe, expect, test } from "vitest";
        import {
            AmazonTTS,
            CartesiaTTS,
            DeepgramTTS,
            ElevenLabsTTS,
            FishAudioTTS,
            GoogleTTS,
            HumeAITTS,
            MiniMaxTTS,
            MurfTTS,
            OpenAITTS,
            RimeTTS,
            SarvamTTS,
        } from "../../../src/agentkit/vendors/tts.js";

        describe("TTS vendor helpers", () => {
            test("serializes provider params using the generated core shapes", () => {
                expect(
                    new AmazonTTS({
                        accessKey: "access",
                        secretKey: "secret",
                        region: "us-east-1",
                        voiceId: "Joanna",
                        engine: "neural",
                    }).toConfig().params,
                ).toMatchObject({
                    aws_access_key_id: "access",
                    aws_secret_access_key: "secret",
                    region_name: "us-east-1",
                    voice: "Joanna",
                    engine: "neural",
                });

                expect(
                    new GoogleTTS({
                        key: "{}",
                        voiceName: "en-US-JennyNeural",
                        languageCode: "en-US",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    credentials: "{}",
                    VoiceSelectionParams: { name: "en-US-JennyNeural", language_code: "en-US" },
                    AudioConfig: { sample_rate_hertz: 24000 },
                });

                expect(
                    new CartesiaTTS({
                        apiKey: "cartesia-key",
                        voiceId: "voice",
                        modelId: "sonic-2",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "cartesia-key",
                    model_id: "sonic-2",
                    voice: { mode: "id", id: "voice" },
                    output_format: { container: "raw", sample_rate: 24000 },
                });

                expect(new RimeTTS({ key: "rime-key", speaker: "speaker", modelId: "mist" }).toConfig().params).toMatchObject({
                    api_key: "rime-key",
                    speaker: "speaker",
                    modelId: "mist",
                });

                expect(
                    new FishAudioTTS({ key: "fish-key", referenceId: "ref", backend: "speech-1.5" }).toConfig().params,
                ).toMatchObject({
                    api_key: "fish-key",
                    reference_id: "ref",
                    backend: "speech-1.5",
                });

                expect(
                    new ElevenLabsTTS({
                        key: "eleven-key",
                        modelId: "eleven_flash_v2_5",
                        voiceId: "voice",
                        baseUrl: "wss://api.elevenlabs.io/v1",
                    }).toConfig().params,
                ).toMatchObject({
                    key: "eleven-key",
                    base_url: "wss://api.elevenlabs.io/v1",
                    model_id: "eleven_flash_v2_5",
                    voice_id: "voice",
                });

                expect(
                    new DeepgramTTS({
                        apiKey: "deepgram-key",
                        model: "aura-2-thalia-en",
                        baseUrl: "wss://api.deepgram.com/v1/speak",
                        sampleRate: 24000,
                        additionalParams: { encoding: "linear16" },
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "deepgram-key",
                    model: "aura-2-thalia-en",
                    base_url: "wss://api.deepgram.com/v1/speak",
                    sample_rate: 24000,
                    encoding: "linear16",
                });

                expect(
                    new OpenAITTS({
                        apiKey: "openai-key",
                        voice: "coral",
                        model: "gpt-4o-mini-tts",
                        baseUrl: "https://api.openai.com/v1",
                        instructions: "speak clearly",
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "openai-key",
                    base_url: "https://api.openai.com/v1",
                    model: "gpt-4o-mini-tts",
                    voice: "coral",
                    instructions: "speak clearly",
                });

                expect(new OpenAITTS({ voice: "coral" }).toConfig().params).toEqual({
                    voice: "coral",
                });

                expect(
                    new HumeAITTS({ key: "hume-key", voiceId: "voice", provider: "CUSTOM_VOICE" }).toConfig().params,
                ).toMatchObject({
                    key: "hume-key",
                    voice_id: "voice",
                    provider: "CUSTOM_VOICE",
                });

                expect(
                    new MiniMaxTTS({
                        key: "minimax-key",
                        groupId: "group",
                        model: "speech-02-turbo",
                        voiceId: "voice",
                        url: "wss://api-uw.minimax.io/ws/v1/t2a_v2",
                    }).toConfig().params,
                ).toMatchObject({
                    key: "minimax-key",
                    group_id: "group",
                    model: "speech-02-turbo",
                    voice_setting: { voice_id: "voice" },
                    url: "wss://api-uw.minimax.io/ws/v1/t2a_v2",
                });

                expect(
                    new SarvamTTS({
                        key: "sarvam-key",
                        speaker: "anushka",
                        targetLanguageCode: "en-IN",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    api_subscription_key: "sarvam-key",
                    speaker: "anushka",
                    target_language_code: "en-IN",
                    sample_rate: 24000,
                });

                expect(
                    new MurfTTS({
                        key: "murf-key",
                        voiceId: "Ariana",
                        baseUrl: "wss://murf.example/ws",
                        locale: "en-US",
                        rate: 0,
                        pitch: 0,
                        model: "FALCON",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "murf-key",
                    base_url: "wss://murf.example/ws",
                    voiceId: "Ariana",
                    locale: "en-US",
                    rate: 0,
                    pitch: 0,
                    model: "FALCON",
                    sample_rate: 24000,
                });

                expect(new MurfTTS({ key: "murf-key" }).toConfig().params).toEqual({
                    api_key: "murf-key",
                });
            });

            test("rejects invalid managed and BYOK TTS shapes at runtime", () => {
                expect(() => new OpenAITTS({ voice: "alloy", model: "tts-1-hd" } as never)).toThrow(
                    "OpenAITTS requires apiKey unless using the Agora-managed tts-1 model",
                );
                expect(() => new OpenAITTS({ apiKey: "openai-key", voice: "alloy", model: "tts-1-hd" } as never)).toThrow(
                    "OpenAITTS requires baseUrl",
                );
                expect(() => new MiniMaxTTS({ model: "unsupported-model" } as never)).toThrow(
                    "MiniMaxTTS requires key unless using a supported Agora-managed model",
                );
                expect(() => new MiniMaxTTS({ key: "minimax-key", model: "speech-02-turbo" } as never)).toThrow(
                    "MiniMaxTTS requires groupId",
                );
            });
        });
