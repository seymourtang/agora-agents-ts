      docs/concepts/agent.md: |
        ---
        sidebar_position: 2
        title: Agent
        description: The Agent builder — configure an AI agent with LLM, TTS, STT, and more.
        ---

        # Agent

        `Agent` is an immutable configuration object. Every builder method returns a **new** `Agent` instance — the original is never modified. This makes agents safe to reuse across multiple sessions.

        ## Constructor options

        <!-- snippet: executable -->
        ```typescript
        import { Agent } from 'agora-agent-server-sdk';

        const agent = new Agent({
          name: 'my-assistant',
          instructions: 'You are a helpful voice assistant.',
          greeting: 'Hello! How can I help?',
          maxHistory: 20,
        });
        ```

        | Option | Type | Description |
        |---|---|---|
        | `name` | `string` | Agent name (used as default session name) |
        | `instructions` | `string` | System prompt — sent as a system message to the LLM |
        | `greeting` | `string` | First message spoken when the session starts |
        | `failureMessage` | `string` | Message spoken when an LLM call fails |
        | `maxHistory` | `number` | Max conversation turns kept in LLM context |
        | `turnDetection` | `TurnDetectionConfig` | Voice activity detection settings |
        | `sal` | `SalConfig` | Selective Attention Locking configuration |
        | `avatar` | `AvatarConfig` | Avatar configuration (prefer `withAvatar()` for type safety) |
        | `advancedFeatures` | `AdvancedFeatures` | Enable MLLM mode, AI-VAD, etc. |
        | `parameters` | `SessionParams` | Session parameters (silence config, farewell config) |
        | `geofence` | `GeofenceConfig` | Regional access restriction |
        | `labels` | `Labels` | Custom key-value labels (returned in callbacks) |
        | `rtc` | `RtcConfig` | RTC media encryption |
        | `fillerWords` | `FillerWordsConfig` | Filler words while waiting for LLM |

        ## Builder methods

        Each method returns a new `Agent` instance with the updated configuration.

        | Method | Signature | Description |
        |---|---|---|
        | `withLlm` | `withLlm(vendor: BaseLLM): Agent` | Set the LLM vendor |
        | `withTts` | `withTts<SR>(vendor: BaseTTS<SR>): Agent<SR>` | Set the TTS vendor (tracks sample rate type) |
        | `withStt` | `withStt(vendor: BaseSTT): Agent` | Set the STT vendor |
        | `withMllm` | `withMllm(vendor: BaseMLLM): Agent` | Set the MLLM vendor (for multimodal flow). Not compatible with `withAvatar()`. |
        | `withAvatar` | `withAvatar<SR>(vendor: BaseAvatar<SR>): Agent` | Set the avatar vendor (enforces TTS sample rate match). Requires the cascading pipeline; not supported with `withMllm()`. |
        | `withTurnDetection` | `withTurnDetection(config: TurnDetectionConfig): Agent` | Configure cascading-flow SOS/EOS detection; use `withInterruption()` for interruption behavior |
        | `withInstructions` | `withInstructions(text: string): Agent` | Override the system prompt |
        | `withGreeting` | `withGreeting(text: string): Agent` | Override the greeting message |
        | `withName` | `withName(name: string): Agent` | Override the agent name |
        | `withSal` | `withSal(config: SalConfig): Agent` | Set SAL configuration |
        | `withAdvancedFeatures` | `withAdvancedFeatures(features: AdvancedFeatures): Agent` | Set advanced features |
        | `withParameters` | `withParameters(parameters: SessionParams): Agent` | Set session parameters |
        | `withFailureMessage` | `withFailureMessage(message: string): Agent` | Set failure message |
        | `withMaxHistory` | `withMaxHistory(maxHistory: number): Agent` | Set max history length |
        | `withGeofence` | `withGeofence(geofence: GeofenceConfig): Agent` | Set geofence configuration |
        | `withLabels` | `withLabels(labels: Labels): Agent` | Set custom labels |
        | `withRtc` | `withRtc(rtc: RtcConfig): Agent` | Set RTC configuration |
        | `withFillerWords` | `withFillerWords(fillerWords: FillerWordsConfig): Agent` | Set filler words configuration |

        ## Creating a session

        Call `createSession()` to bind the agent to a client and channel:

        <!-- snippet: fragment -->
        ```typescript
        const session = agent.createSession(client, {
          channel: 'room-123',
          agentUid: '1',
          remoteUids: ['100'],
          idleTimeout: 120,
        });
        ```

        ### SessionOptions

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `channel` | `string` | Yes | Channel name to join |
        | `agentUid` | `string` | Yes | The agent's RTC UID |
        | `remoteUids` | `string[]` | Yes | Remote user UIDs to subscribe to |
        | `name` | `string` | No | Session name (defaults to agent name or auto-generated) |
        | `token` | `string` | No | Pre-built RTC token (omit to auto-generate) |
        | `idleTimeout` | `number` | No | Seconds before auto-exit if no audio (0 = disabled) |
        | `enableStringUid` | `boolean` | No | Use string UIDs instead of numeric |
        | `debug` | `boolean` | No | Log API requests to console |

        ## Immutable reuse

        Because every method returns a new instance, you can create a base agent and derive variations:

        <!-- snippet: executable -->
        ```typescript
        import { Agent, OpenAI, ElevenLabsTTS, DeepgramSTT } from 'agora-agent-server-sdk';

        const base = new Agent({ instructions: 'You are helpful.' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({ key: 'your-elevenlabs-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }));

        // Two sessions from the same agent config — safe, no shared mutable state
        const sessionA = base.createSession(client, { channel: 'room-a', agentUid: '1', remoteUids: ['100'] });
        const sessionB = base.createSession(client, { channel: 'room-b', agentUid: '1', remoteUids: ['200'] });
        ```

        See [Agent Reference](../reference/agent.md) for full TypeScript signatures.
      docs/concepts/vendors.md: |
        ---
        sidebar_position: 4
        title: Vendors
        description: Typed vendor classes for LLM, TTS, STT, MLLM, and Avatar providers.
        ---

        # Vendors

        Each vendor is a typed class that validates options at construction time and serializes to the wire format for the Agora API. Import all vendors from `agora-agent-server-sdk`.

        ## LLM vendors

        | Class | Provider | Key constructor params |
        |---|---|---|
        | `OpenAI` | OpenAI Chat Completions | `apiKey`, `model`, `url?`, `maxHistory?`, `greetingMessage?`, `failureMessage?` |
        | `AzureOpenAI` | Azure OpenAI | `apiKey`, `model`, `resourceName`, `deploymentName`, `apiVersion?` |
        | `Anthropic` | Anthropic Claude | `apiKey`, `model`, `url?`, `maxHistory?` |
        | `Gemini` | Google Gemini | `apiKey`, `model`, `url?`, `maxHistory?` |

        <!-- snippet: executable -->
        ```typescript
        import { OpenAI } from 'agora-agent-server-sdk';

        const llm = new OpenAI({
          apiKey: 'your-openai-key',
          model: 'gpt-4o-mini',
        });
        ```

        ## TTS vendors

        | Class | Provider | `sampleRate` options |
        |---|---|---|
        | `ElevenLabsTTS` | ElevenLabs | 16000, 22050, 24000, 44100 |
        | `MicrosoftTTS` | Azure Speech | 16000, 24000, 48000 |
        | `OpenAITTS` | OpenAI TTS | Fixed at 24000 |
        | `CartesiaTTS` | Cartesia | 8000, 16000, 22050, 24000, 44100, 48000 |
        | `GoogleTTS` | Google Cloud TTS | Not configurable via constructor |
        | `AmazonTTS` | Amazon Polly | Not configurable via constructor |
        | `HumeAITTS` | Hume AI | Not configurable via constructor |
        | `RimeTTS` | Rime | Not configurable via constructor |
        | `FishAudioTTS` | Fish Audio | Not configurable via constructor |
        | `MiniMaxTTS` | MiniMax | Not configurable via constructor |
        | `MurfTTS` | Murf | Not configurable via constructor |
        | `DeepgramTTS` | Deepgram | Configurable |
        | `SarvamTTS` | Sarvam AI | Not configurable via constructor |

        <!-- snippet: executable -->
        ```typescript
        import { ElevenLabsTTS } from 'agora-agent-server-sdk';

        const tts = new ElevenLabsTTS({
          key: 'your-elevenlabs-key',
          modelId: 'eleven_flash_v2_5',
          voiceId: 'your-voice-id',
          sampleRate: 24000,
        });
        ```

        The `sampleRate` is critical when using avatars. See [Avatar Integration](../guides/avatars.md) for details.

        ## STT vendors

        | Class | Provider | Key constructor params |
        |---|---|---|
        | `SpeechmaticsSTT` | Speechmatics | `apiKey`, `language` |
        | `DeepgramSTT` | Deepgram | `apiKey?`, `model?`, `language?`, `smartFormat?` |
        | `MicrosoftSTT` | Azure Speech | `key`, `region`, `language?` |
        | `OpenAISTT` | OpenAI Whisper | `apiKey`, `model?`, `language?` |
        | `GoogleSTT` | Google Speech | `apiKey`, `language?` |
        | `AmazonSTT` | Amazon Transcribe | `accessKey`, `secretKey`, `region`, `language?` |
        | `AssemblyAISTT` | AssemblyAI | `apiKey`, `language?` |
        | `AresSTT` | Agora ARES | `language?` |
        | `SarvamSTT` | Sarvam AI | `apiKey`, `language` |

        <!-- snippet: executable -->
        ```typescript
        import { DeepgramSTT } from 'agora-agent-server-sdk';

        const stt = new DeepgramSTT({
          apiKey: 'your-deepgram-key',
          model: 'nova-2',
          language: 'en-US',
        });
        ```

        ## MLLM vendors

        MLLM (Multimodal LLM) vendors handle audio end-to-end — no separate STT or TTS step. Call `agent.withMllm(vendor)` and MLLM mode is enabled automatically; no separate `advancedFeatures` flag is needed.

        | Class | Provider | Key constructor params |
        |---|---|---|
        | `OpenAIRealtime` | OpenAI Realtime API | `apiKey`, `model?`, `url?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |
        | `GeminiLive` | Google Gemini Live API | `apiKey`, `model`, `url?`, `voice?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |
        | `VertexAI` | Vertex AI Gemini Live | `model`, `url?`, `projectId`, `location`, `adcCredentialsString`, `voice?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |
        | `XaiGrok` | xAI Grok (`mllm.vendor`: `xai`) | `apiKey`, `url?`, `voice?`, `language?`, `sampleRate?`, `greetingMessage?`, `failureMessage?`, `inputModalities?`, `outputModalities?`, `messages?`, `turnDetection?` |

        > Future xAI **STT** and **TTS** vendors will be named `XaiSTT` and `XaiTTS` (cascading pipeline), not `XaiRealtime`. See workspace `docs/AGENTKIT-VENDOR-NAMING.md`.

        <!-- snippet: executable -->
        ```typescript
        import { OpenAIRealtime } from 'agora-agent-server-sdk';

        const mllm = new OpenAIRealtime({
          apiKey: 'your-openai-key',
          model: 'gpt-4o-realtime-preview',
          greetingMessage: 'Hello! Ready to chat.',
        });
        ```

        See [MLLM Flow Guide](../guides/mllm-flow.md) for full examples.

        ## Avatar vendors

        Avatars provide a visual representation for the agent. Several avatar vendors require a specific TTS sample rate — this is enforced at both compile time and runtime.

        > Avatars currently require the cascading ASR + LLM + TTS pipeline. They are not supported with MLLM (`OpenAIRealtime`, `GeminiLive`, `VertexAI`, `XaiGrok`); combining the two throws at `Agent.toProperties()` and `AgentSession.start()`.

        | Class | Provider | Required TTS sample rate |
        |---|---|---|
        | `LiveAvatarAvatar` | LiveAvatar (formerly HeyGen) | 24000 Hz |
        | `HeyGenAvatar` | HeyGen (deprecated, use `LiveAvatarAvatar`) | 24000 Hz |
        | `AkoolAvatar` | Akool | 16000 Hz |
        | `AnamAvatar` | Anam | Provider-defined |
        | `GenericAvatar` | Custom avatar provider | Provider-defined |

        See [Avatar Integration](../guides/avatars.md) for full examples and the sample-rate constraint details.

        For detailed constructor options for every vendor, see [Vendor Reference](../reference/vendors.md).
      docs/guides/agent-builder-features.md: |
        ---
        sidebar_position: 5
        title: Agent Builder Features
        description: Configure SAL, advanced features, parameters, geofence, labels, RTC, filler words, and more.
        ---

        # Agent Builder Features

        The Agent builder supports many configuration options beyond the core LLM, TTS, and STT vendors. This guide shows how to use each feature.

        ## Overview

        | Feature | Method | Description |
        |---|---|---|
        | `sal` | `withSal(config)` | Selective Attention Locking — speaker recognition and noise suppression |
        | `advancedFeatures` | `withAdvancedFeatures(features)` | Enable MLLM, RTM, SAL, tools |
        | `tools` | `withTools(enabled)` | Enable MCP tool invocation |
        | `parameters` | `withParameters(params)` | Silence config, farewell config, data channel |
        | `failureMessage` | `withFailureMessage(msg)` | Message spoken when LLM fails |
        | `maxHistory` | `withMaxHistory(n)` | Max conversation turns in LLM context |
        | `geofence` | `withGeofence(config)` | Restrict backend server regions |
        | `labels` | `withLabels(labels)` | Custom key-value labels (returned in callbacks) |
        | `rtc` | `withRtc(config)` | RTC media encryption |
        | `fillerWords` | `withFillerWords(config)` | Filler words while waiting for LLM |

        ## SAL (Selective Attention Locking)

        SAL helps the agent focus on the primary speaker and suppress background noise. Enable it via `advancedFeatures` and configure with `withSal`:

        ```typescript
        import {
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
        } from 'agora-agent-server-sdk';

        const agent = new Agent({
          name: 'sal-assistant',
          instructions: 'You are a helpful assistant.',
        })
          .withLlm(new OpenAI({ apiKey: 'your-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-key', model: 'nova-2', language: 'en-US' }))
          .withAdvancedFeatures({ enable_sal: true })
          .withSal({
            sal_mode: 'locking',
            sample_urls: { 'primary-speaker': 'https://example.com/voiceprint.pcm' },
          });
        ```

        `sal_mode` can be `'locking'` (speaker lock) or `'recognition'` (voiceprint recognition).

        ## Advanced Features

        Enable MLLM, RTM, SAL, or tools:

        ```typescript
        import { Agent } from 'agora-agent-server-sdk';

        // MLLM mode (see mllm-flow guide) — withMllm() enables it automatically
        const mllmAgent = new Agent()
          .withMllm(/* ... */);

        // RTM signaling for custom data delivery
        const rtmAgent = new Agent()
          .withAdvancedFeatures({ enable_rtm: true });

        // Enable tool invocation via MCP
        const toolsAgent = new Agent()
          .withTools();
        ```

        ## Session Parameters

        Configure silence handling, farewell behavior, and data channel:

        ```typescript
        import { Agent } from 'agora-agent-server-sdk';

        const agent = new Agent({ name: 'params-agent' })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */)
          .withParameters({
            silence_config: {
              timeout_ms: 10000,
              action: 'speak',
              content: 'I\'m still here. Take your time.',
            },
            farewell_config: {
              graceful_enabled: true,
              graceful_timeout_seconds: 10,
            },
            data_channel: 'rtm', // or 'datastream'
          });
        ```

        ## Failure Message and Max History

        ```typescript
        const agent = new Agent({
          name: 'assistant',
          failureMessage: 'Sorry, I encountered an error. Please try again.',
          maxHistory: 20,
        })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);

        // Or via builder methods
        const agent2 = new Agent()
          .withFailureMessage('Something went wrong.')
          .withMaxHistory(15)
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## Geofence

        Restrict which geographic regions the backend can use:

        ```typescript
        const agent = new Agent()
          .withGeofence({
            area: 'NORTH_AMERICA',
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);

        // Global with exclusion
        const agent2 = new Agent()
          .withGeofence({
            area: 'GLOBAL',
            exclude_area: 'EUROPE',
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        Valid `area` values: `'GLOBAL'`, `'NORTH_AMERICA'`, `'EUROPE'`, `'ASIA'`, `'INDIA'`, `'JAPAN'`.

        ## Labels

        Attach custom labels returned in notification callbacks:

        ```typescript
        const agent = new Agent()
          .withLabels({
            environment: 'production',
            team: 'support',
            version: '1.2.0',
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## RTC Encryption

        Configure RTC media encryption:

        ```typescript
        const agent = new Agent()
          .withRtc({
            encryption_key: 'your-32-byte-key',
            encryption_mode: 5, // AES_128_GCM
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## Filler Words

        Play filler words while waiting for the LLM response:

        ```typescript
        const agent = new Agent()
          .withFillerWords({
            enable: true,
            trigger: {
              mode: 'fixed_time',
              fixed_time_config: { response_wait_ms: 2000 },
            },
            content: {
              mode: 'static',
              static_config: {
                phrases: ['Let me think...', 'One moment...', 'Hmm...'],
                selection_rule: 'shuffle',
              },
            },
          })
          .withLlm(/* ... */)
          .withTts(/* ... */)
          .withStt(/* ... */);
        ```

        ## Getters

        Read back configuration via getter properties:

        ```typescript
        const agent = new Agent({ maxHistory: 20 })
          .withGeofence({ area: 'EUROPE' })
          .withLabels({ env: 'staging' });

        agent.name;           // string | undefined
        agent.maxHistory;     // 20
        agent.geofence;       // { area: 'NORTH_AMERICA' }
        agent.labels;         // { env: 'staging' }
        agent.sal;            // SalConfig | undefined
        agent.advancedFeatures;
        agent.parameters;
        agent.failureMessage;
        agent.rtc;
        agent.fillerWords;
        agent.config;         // Full read-only snapshot
        ```

        ## Chaining All Features

        ```typescript
        import {
          Agent,
          AgoraClient,
          Area,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
        } from 'agora-agent-server-sdk';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
          authToken: 'your-rest-auth-token',
        });

        const agent = new Agent({
          name: 'full-featured-assistant',
          instructions: 'You are a helpful voice assistant.',
          greeting: 'Hello! How can I help?',
          failureMessage: 'Sorry, I had trouble processing that.',
          maxHistory: 20,
        })
          .withLlm(new OpenAI({ apiKey: 'your-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withStt(new DeepgramSTT({ apiKey: 'your-key', model: 'nova-2', language: 'en-US' }))
          .withAdvancedFeatures({ enable_rtm: true })
          .withParameters({
            silence_config: { timeout_ms: 8000, action: 'speak', content: 'I\'m listening.' },
            farewell_config: { graceful_enabled: true, graceful_timeout_seconds: 5 },
          })
          .withGeofence({ area: 'NORTH_AMERICA' })
          .withLabels({ app: 'voice-assistant', version: '2.0' })
          .withFillerWords({
            enable: true,
            trigger: { mode: 'fixed_time', fixed_time_config: { response_wait_ms: 1500 } },
            content: {
              mode: 'static',
              static_config: {
                phrases: ['Let me think...', 'One moment please.'],
                selection_rule: 'shuffle',
              },
            },
          });

        const session = agent.createSession(client, {
          channel: 'demo-room',
          agentUid: '1',
          remoteUids: ['100'],
          token: 'your-rtc-join-token',
          idleTimeout: 120,
        });

        const agentId = await session.start();
        ```

        ## Next steps

        - [Agent Reference](../reference/agent.md) — full API signatures
        - [Cascading Flow](./cascading-flow.md) — ASR → LLM → TTS setup
        - [MLLM Flow](./mllm-flow.md) — end-to-end audio with OpenAI Realtime, Gemini Live, Vertex AI, or xAI Grok
        - [Regional Routing](./regional-routing.md) — client area and geofence
      docs/guides/avatars.md: |
        ---
        sidebar_position: 3
        title: Avatar Integration
        description: Add a digital avatar to your Conversational AI agent.
        ---

        # Avatar Integration

        Avatars attach a visual representation to the agent's audio output.

        | Avatar | Provider | Required TTS sample rate |
        |---|---|---|
        | `LiveAvatarAvatar` | LiveAvatar (formerly HeyGen) | **24,000 Hz** |
        | `HeyGenAvatar` | Deprecated HeyGen alias | **24,000 Hz** |
        | `AkoolAvatar` | Akool | **16,000 Hz** |
        | `AnamAvatar` | Anam | Consult provider docs |
        | `GenericAvatar` | Custom avatar provider | Consult provider docs |

        ## Avatars require the cascading pipeline

        Avatars currently only work with the cascading **ASR + LLM + TTS** pipeline. They are **not** supported with MLLM (`OpenAIRealtime`, `GeminiLive`, `VertexAI`, `XaiGrok`). AgentKit rejects the combination at `Agent.toProperties()` and at `AgentSession.start()` so you see a clear error before the request reaches the backend:

        ```
        Avatars are only supported with the cascading ASR + LLM + TTS pipeline.
        Remove the avatar configuration when using MLLM, or switch to a cascading session.
        ```

        If you need an MLLM session, omit the avatar; if you need an avatar, use the cascading pipeline.

        ## Avatar tokens

        The agent and the avatar publish with separate RTC identities:

        | Identity | Field | UID |
        |---|---|---|
        | Agent audio pipeline | `properties.token` | `agent_rtc_uid` |
        | Avatar video publisher | `avatar.params.agora_token` | `avatar.params.agora_uid` |

        AgentKit auto-fills `agora_token` for avatar vendors that publish a separate RTC video identity:

        - `LiveAvatarAvatar` (and the deprecated `HeyGenAvatar` alias)
        - `GenericAvatar`

        For `AkoolAvatar` and `AnamAvatar`, the avatar provider handles publishing on its own and AgentKit never injects an `agora_token`. Use `isAvatarTokenManaged(avatar)` to check whether a config falls into the managed group.

        When `agoraToken` is omitted on a managed vendor, AgentKit generates it at `session.start()` from the session App ID, channel, app certificate, and avatar `agoraUid`. The generated token uses the same ConvoAI token format as the agent token, but is scoped to the avatar `agoraUid`. AgentKit never overwrites a user-provided avatar token.

        Keep `agoraUid` unique from `agentUid`. AgentKit warns when they match (managed vendors only).

        ## The sample-rate constraint

        Avatars require the TTS audio to be at a specific sample rate. If you use the wrong rate, the avatar will not render correctly. The SDK enforces this in two ways:

        ### 1. Compile-time enforcement (TypeScript phantom types)

        The `Agent` class tracks the TTS sample rate as a type parameter. When you call `.withAvatar()`, TypeScript checks that the TTS sample rate type matches the avatar's required rate. If they don't match, you get a compile error:

        ```typescript
        import { Agent, ElevenLabsTTS, HeyGenAvatar } from 'agora-agent-server-sdk';

        // This works — ElevenLabs at 24kHz matches HeyGen's requirement
        const good = new Agent({ name: 'avatar-agent' })
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 24000 }))
          .withAvatar(new HeyGenAvatar({ apiKey: 'your-heygen-key', quality: 'high', agoraUid: '12345' }));

        // This fails at compile time — 16kHz does not match HeyGen's required 24kHz
        const bad = new Agent({ name: 'avatar-agent' })
          .withTts(new ElevenLabsTTS({ key: 'your-key', modelId: 'eleven_flash_v2_5', voiceId: 'your-voice-id', sampleRate: 16000 }))
          .withAvatar(new HeyGenAvatar({ apiKey: 'your-heygen-key', quality: 'high', agoraUid: '12345' }));
          //         ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
          // TypeScript error: 'this' context of type 'Agent<16000>' is not assignable to
          // method's 'this' of type 'Agent<24000>'
        ```

        ### 2. Runtime enforcement

        If phantom types are bypassed (for example, when config comes from external data), `session.start()` validates the TTS sample rate against the avatar vendor before sending the API request:

        ```
        Error: HeyGen avatars ONLY support 24,000 Hz sample rate. Your TTS is configured
        with 16000 Hz. Please update your TTS configuration to use 24kHz sample rate.
        See: https://docs.agora.io/en/conversational-ai/models/avatar/heygen
        ```

        For Akool:

        ```
        Error: Akool avatars ONLY support 16,000 Hz sample rate. Your TTS is configured
        with 24000 Hz. Please update your TTS configuration to use 16kHz sample rate.
        See: https://docs.agora.io/en/conversational-ai/models/avatar/akool
        ```

        ## Example: LiveAvatar with auto-generated avatar token

        ```typescript
        import {
          AgoraClient,
          Area,
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
          LiveAvatarAvatar,
        } from 'agora-agent-server-sdk';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
          authToken: 'your-rest-auth-token',
        });

        const agent = new Agent({ name: 'liveavatar-agent', instructions: 'You are a friendly avatar assistant.' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({
            key: 'your-elevenlabs-key',
            modelId: 'eleven_flash_v2_5',
            voiceId: 'your-voice-id',
            sampleRate: 24000,  // Required for LiveAvatar
          }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }))
          .withAvatar(new LiveAvatarAvatar({
            apiKey: 'your-liveavatar-key',
            quality: 'high',
            agoraUid: '200', // unique avatar video UID
            avatarId: 'your-avatar-id',
            // agoraToken omitted: AgentKit generates it at session.start()
          }));

        const session = agent.createSession(client, {
          channel: 'avatar-room',
          agentUid: '1', // distinct from avatar agoraUid
          remoteUids: ['100'],
        });

        await session.start();
        ```

        ## Example: Generic avatar

        ```typescript
        import { Agent, GenericAvatar, OpenAI, OpenAITTS, AresSTT } from 'agora-agent-server-sdk';

        const agent = new Agent({ name: 'generic-avatar-agent' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new OpenAITTS({ apiKey: 'your-openai-tts-key', model: 'tts-1', voice: 'alloy' }))
          .withStt(new AresSTT())
          .withAvatar(new GenericAvatar({
            apiKey: 'your-avatar-provider-key',
            apiBaseUrl: 'https://avatar-provider.example.com',
            avatarId: 'avatar-id',
            agoraUid: '200',
            // agoraAppId, agoraChannel, and agoraToken are filled from the session.
          }));
        ```

        ## Example: Akool avatar with ElevenLabs at 16kHz

        ```typescript
        import {
          AgoraClient,
          Area,
          Agent,
          OpenAI,
          ElevenLabsTTS,
          DeepgramSTT,
          AkoolAvatar,
        } from 'agora-agent-server-sdk';

        const client = new AgoraClient({
          area: Area.US,
          appId: 'your-app-id',
          appCertificate: 'your-app-certificate',
          authToken: 'your-rest-auth-token',
        });

        const agent = new Agent({ name: 'akool-agent', instructions: 'You are a friendly avatar assistant.' })
          .withLlm(new OpenAI({ apiKey: 'your-openai-key', model: 'gpt-4o-mini' }))
          .withTts(new ElevenLabsTTS({
            key: 'your-elevenlabs-key',
            modelId: 'eleven_flash_v2_5',
            voiceId: 'your-voice-id',
            sampleRate: 16000,  // Required for Akool
          }))
          .withStt(new DeepgramSTT({ apiKey: 'your-deepgram-key', model: 'nova-2' }))
          .withAvatar(new AkoolAvatar({
            apiKey: 'your-akool-key',
            avatarId: 'your-avatar-id',
          }));

        const session = agent.createSession(client, {
          channel: 'avatar-room',
          agentUid: '1',
          remoteUids: ['100'],
          token: 'your-rtc-join-token',
        });

        await session.start();
        ```

        ## HeyGenAvatar constructor options

        `HeyGenAvatar` is deprecated. Use `LiveAvatarAvatar` for new integrations.

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | HeyGen API key |
        | `quality` | `"low" \| "medium" \| "high"` | Yes | Video quality (360p / 480p / 720p) |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream (must be unique in the channel) |
        | `agoraToken` | `string` | No | Avatar token override. Omit to auto-generate at `session.start()` |
        | `avatarId` | `string` | No | HeyGen avatar ID |
        | `disableIdleTimeout` | `boolean` | No | Disable idle timeout (default: false) |
        | `activityIdleTimeout` | `number` | No | Idle timeout in seconds (default: 120) |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## LiveAvatarAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | LiveAvatar API key |
        | `quality` | `"low" \| "medium" \| "high"` | Yes | Video quality |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream (must be unique in the channel) |
        | `agoraToken` | `string` | No | Avatar token override. Omit to auto-generate at `session.start()` |
        | `avatarId` | `string` | No | Avatar ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## AkoolAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Akool API key |
        | `avatarId` | `string` | No | Akool avatar ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## AnamAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Anam API key |
        | `personaId` | `string` | No | Anam persona ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ## GenericAvatar constructor options

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Custom avatar provider API key |
        | `apiBaseUrl` | `string` | Yes | Avatar provider API base URL |
        | `avatarId` | `string` | Yes | Avatar ID |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream |
        | `agoraAppId` | `string` | No | Omit to use the session App ID |
        | `agoraChannel` | `string` | No | Omit to use the session channel |
        | `agoraToken` | `string` | No | Avatar token override. Omit to auto-generate at `session.start()` |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |
