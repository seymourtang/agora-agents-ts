                    throw new Error(`Cannot interrupt in ${this._status} state`);
                }

                if (!this._agentId) {
                    throw new Error("No agent ID available");
                }

                await this._client.agents.interrupt(
                    {
                        appid: this._appId,
                        agentId: this._agentId,
                    },
                    { headers: this._convoAIHeaders() },
                );
            }

