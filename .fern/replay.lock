  - id: patch-20ef7f95
    content_hash: sha256:5b7ef05ce900bd8cd67b21cb712d01161a7e9b0c301f88569176f63c7a2f1186
    original_commit: 20ef7f959c7b4e32ecfe18d137f1c272ac5b2278
    original_message: Harden release workflow for compat shim publishing Wait for the primary agora-agents package to appear on npm before publishing the compat package, and retry compat publish on transient failures.
    original_author: digitallysavvy <hermes.frangoudis@gmail.com>
    base_generation: 669ebcf9e0fa87c3d0e7875682db6fe0ecb5bb33
    files:
      - .github/workflows/release.yml
    patch_content: |+
      From 20ef7f959c7b4e32ecfe18d137f1c272ac5b2278 Mon Sep 17 00:00:00 2001
      From: digitallysavvy <hermes.frangoudis@gmail.com>
      Date: Wed, 27 May 2026 16:57:04 -0400
      Subject: [PATCH] Harden release workflow for compat shim publishing Wait for
       the primary agora-agents package to appear on npm before publishing the
       compat package, and retry compat publish on transient failures.

      ---
       .github/workflows/release.yml | 26 +++++++++++++++++++++++++-
       1 file changed, 25 insertions(+), 1 deletion(-)

      diff --git a/.github/workflows/release.yml b/.github/workflows/release.yml
      index 4158537..08a983f 100644
      --- a/.github/workflows/release.yml
      +++ b/.github/workflows/release.yml
      @@ -87,6 +87,23 @@ jobs:
               env:
                 NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
       
      +      - name: Wait for primary package on npm
      +        run: |
      +          TAG_VERSION="${RELEASE_TAG#v}"
      +          PACKAGE="agora-agents"
      +          for attempt in $(seq 1 12); do
      +            if npm view "${PACKAGE}@${TAG_VERSION}" version >/dev/null 2>&1; then
      +              echo "${PACKAGE}@${TAG_VERSION} is available on npm."
      +              exit 0
      +            fi
      +            echo "Waiting for ${PACKAGE}@${TAG_VERSION} on npm (attempt $attempt/12)..."
      +            sleep 10
      +          done
      +          echo "Timed out waiting for ${PACKAGE}@${TAG_VERSION} on npm."
      +          exit 1
      +        env:
      +          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      +
             - name: Publish compatibility shim to npm
               run: |
                 PACKAGE_NAME="$(node -p "require('./compat/agora-agent-server-sdk/package.json').name")"
      @@ -98,7 +115,14 @@ jobs:
                 fi
       
                 cd compat/agora-agent-server-sdk
      -          npm publish --access public
      +          for attempt in $(seq 1 3); do
      +            if npm publish --access public; then
      +              exit 0
      +            fi
      +            echo "Compat publish failed (attempt $attempt/3). Retrying in 15s..."
      +            sleep 15
      +          done
      +          exit 1
               env:
                 NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
       
      -- 
      2.52.0

    theirs_snapshot:
      .github/workflows/release.yml: |
        name: npm release

        on:
          push:
            tags:
              - "v*"
          workflow_dispatch:
            inputs:
              tag:
                description: "Existing tag to release, for example v1.4.0"
                required: true
                type: string

        permissions:
          contents: read
          id-token: write

        jobs:
          publish:
            runs-on: ubuntu-latest
            env:
              RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4
                with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

              - name: Set up node
                uses: actions/setup-node@v4
                with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Build
                run: pnpm build

              - name: Test
                run: pnpm test:unit

              - name: Verify release tag
                run: |
                  TAG="${RELEASE_TAG}"
                  git rev-parse "$TAG" >/dev/null

              - name: Verify package versions match release tag
                run: |
                  TAG_VERSION="${RELEASE_TAG#v}"
                  ROOT_VERSION="$(node -p "require('./package.json').version")"
                  COMPAT_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').version")"
                  COMPAT_DEP_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').dependencies['agora-agents']")"

                  if [ "$ROOT_VERSION" != "$TAG_VERSION" ]; then
                    echo "Root package version ($ROOT_VERSION) does not match tag version ($TAG_VERSION)."
                    exit 1
                  fi

                  if [ "$COMPAT_VERSION" != "$TAG_VERSION" ]; then
                    echo "Compat package version ($COMPAT_VERSION) does not match tag version ($TAG_VERSION)."
                    exit 1
                  fi

                  if [ "$COMPAT_DEP_VERSION" != "^$TAG_VERSION" ]; then
                    echo "Compat package dependency on agora-agents ($COMPAT_DEP_VERSION) does not match ^$TAG_VERSION."
                    exit 1
                  fi

              - name: Publish primary package to npm
                run: |
                  PACKAGE_NAME="$(node -p "require('./package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
                    exit 0
                  fi

                  npm publish --access public
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

              - name: Wait for primary package on npm
                run: |
                  TAG_VERSION="${RELEASE_TAG#v}"
                  PACKAGE="agora-agents"
                  for attempt in $(seq 1 12); do
