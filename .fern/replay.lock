    patch_content: |+
      From 461572cb3885a50755dbe8145a46bb1bd5f30edf Mon Sep 17 00:00:00 2001
      From: digitallysavvy <hermes.frangoudis@gmail.com>
      Date: Wed, 27 May 2026 16:56:44 -0400
      Subject: [PATCH] Add CI job to verify compat package re-exports Introduce
       verify-compat.js and a compat-build workflow job that builds the primary
       package, installs the compat shim locally, and asserts key exports match
       agora-agents.

