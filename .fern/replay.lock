        ## Avatar vendors

        AgentKit auto-fills `agora_token` only for vendors that publish a separate RTC video identity: `HeyGenAvatar`, `LiveAvatarAvatar`, and `GenericAvatar`. When `agoraToken` is omitted on those vendors, AgentKit generates it at `session.start()` from the session App ID, channel, app certificate, and avatar `agoraUid`. Avatar tokens use the same ConvoAI token format as agent tokens, scoped to the avatar UID. Explicit `agoraToken` values are preserved. `AkoolAvatar` and `AnamAvatar` never receive an auto-generated token (the avatar provider handles publishing). Use `isAvatarTokenManaged(avatar)` to check whether a config is in the managed group.

        ### HeyGenAvatar

        <!-- snippet: fragment -->
        ```typescript
        new HeyGenAvatar(options: HeyGenAvatarOptions)
        ```

        Deprecated. Use `LiveAvatarAvatar` for new integrations. Requires TTS at **24,000 Hz**. See [Avatar Integration](../guides/avatars.md).

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | HeyGen API key |
        | `quality` | `"low" \| "medium" \| "high"` | Yes | Video quality (360p / 480p / 720p) |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream |
        | `agoraToken` | `string` | No | Avatar token override |
        | `avatarId` | `string` | No | HeyGen avatar ID |
        | `disableIdleTimeout` | `boolean` | No | Disable idle timeout (default: false) |
        | `activityIdleTimeout` | `number` | No | Idle timeout in seconds (default: 120) |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ### LiveAvatarAvatar

        <!-- snippet: fragment -->
        ```typescript
        new LiveAvatarAvatar(options: LiveAvatarAvatarOptions)
        ```

        Requires TTS at **24,000 Hz**. See [Avatar Integration](../guides/avatars.md).

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | LiveAvatar API key |
        | `quality` | `"low" \| "medium" \| "high"` | Yes | Video quality |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream |
        | `agoraToken` | `string` | No | Avatar token override |
        | `avatarId` | `string` | No | Avatar ID |
        | `disableIdleTimeout` | `boolean` | No | Disable idle timeout |
        | `activityIdleTimeout` | `number` | No | Idle timeout in seconds |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ### AkoolAvatar

        <!-- snippet: fragment -->
        ```typescript
        new AkoolAvatar(options: AkoolAvatarOptions)
        ```

        Requires TTS at **16,000 Hz**. See [Avatar Integration](../guides/avatars.md).

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Akool API key |
        | `avatarId` | `string` | No | Akool avatar ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ### AnamAvatar

        <!-- snippet: fragment -->
        ```typescript
        new GenericAvatar(options: GenericAvatarOptions)
        ```

        Generic avatars can omit `agoraAppId`, `agoraChannel`, and `agoraToken`. AgentKit fills them from the session at `start()`.

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Custom avatar provider API key |
        | `apiBaseUrl` | `string` | Yes | Avatar provider API base URL |
        | `avatarId` | `string` | Yes | Avatar ID |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream |
        | `agoraAppId` | `string` | No | Agora App ID override |
        | `agoraChannel` | `string` | No | Agora channel override |
        | `agoraToken` | `string` | No | Avatar token override |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |



        <!-- snippet: fragment -->
        ```typescript
        new AnamAvatar(options: AnamAvatarOptions)
        ```

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Anam API key |
        | `personaId` | `string` | No | Anam persona ID |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |

        ### GenericAvatar

        <!-- snippet: fragment -->
        ```typescript
        new GenericAvatar(options: GenericAvatarOptions)
        ```

        Generic avatars can omit `agoraAppId`, `agoraChannel`, and `agoraToken`. AgentKit fills them from the session at `start()`.

        | Option | Type | Required | Description |
        |---|---|---|---|
        | `apiKey` | `string` | Yes | Custom avatar provider API key |
        | `apiBaseUrl` | `string` | Yes | Avatar provider API base URL |
        | `avatarId` | `string` | Yes | Avatar ID |
        | `agoraUid` | `string` | Yes | RTC UID for the avatar stream |
        | `agoraAppId` | `string` | No | Agora App ID override |
        | `agoraChannel` | `string` | No | Agora channel override |
        | `agoraToken` | `string` | No | Avatar token override |
        | `enable` | `boolean` | No | Enable/disable the avatar (default: true) |
      tests/unit/agentkit/tts-vendors.test.ts: |
        import { describe, expect, test } from "vitest";
        import {
            AmazonTTS,
            CartesiaTTS,
            DeepgramTTS,
            ElevenLabsTTS,
            FishAudioTTS,
            GoogleTTS,
            HumeAITTS,
            MicrosoftTTS,
            MiniMaxTTS,
            MurfTTS,
            OpenAITTS,
            RimeTTS,
            SarvamTTS,
        } from "../../../src/agentkit/vendors/tts.js";

        describe("TTS vendor helpers", () => {
            test("serializes provider params using the generated core shapes", () => {
                expect(
                    new AmazonTTS({
                        accessKey: "access",
                        secretKey: "secret",
                        region: "us-east-1",
                        voiceId: "Joanna",
                        engine: "neural",
                    }).toConfig().params,
                ).toMatchObject({
                    aws_access_key_id: "access",
                    aws_secret_access_key: "secret",
                    region_name: "us-east-1",
                    voice: "Joanna",
                    engine: "neural",
                });

                expect(
                    new GoogleTTS({
                        key: "{}",
                        voiceName: "en-US-JennyNeural",
                        languageCode: "en-US",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    credentials: "{}",
                    VoiceSelectionParams: { name: "en-US-JennyNeural", language_code: "en-US" },
                    AudioConfig: { sample_rate_hertz: 24000 },
                });

                expect(
                    new CartesiaTTS({
                        apiKey: "cartesia-key",
                        voiceId: "voice",
                        modelId: "sonic-2",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "cartesia-key",
                    model_id: "sonic-2",
                    voice: { mode: "id", id: "voice" },
                    output_format: { container: "raw", sample_rate: 24000 },
                });

                expect(new RimeTTS({ key: "rime-key", speaker: "speaker", modelId: "mist" }).toConfig().params).toMatchObject({
                    api_key: "rime-key",
                    speaker: "speaker",
                    modelId: "mist",
                });

                expect(
                    new FishAudioTTS({ key: "fish-key", referenceId: "ref", backend: "speech-1.5" }).toConfig().params,
                ).toMatchObject({
                    api_key: "fish-key",
                    reference_id: "ref",
                    backend: "speech-1.5",
                });

                expect(
                    new ElevenLabsTTS({
                        key: "eleven-key",
                        modelId: "eleven_flash_v2_5",
                        voiceId: "voice",
                        baseUrl: "wss://api.elevenlabs.io/v1",
                    }).toConfig().params,
                ).toMatchObject({
                    key: "eleven-key",
                    base_url: "wss://api.elevenlabs.io/v1",
                    model_id: "eleven_flash_v2_5",
                    voice_id: "voice",
                });

                expect(
                    new DeepgramTTS({
                        apiKey: "deepgram-key",
                        model: "aura-2-thalia-en",
                        baseUrl: "wss://api.deepgram.com/v1/speak",
                        sampleRate: 24000,
                        additionalParams: { encoding: "linear16" },
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "deepgram-key",
                    model: "aura-2-thalia-en",
                    base_url: "wss://api.deepgram.com/v1/speak",
                    sample_rate: 24000,
                    encoding: "linear16",
                });

                expect(
                    new OpenAITTS({
                        apiKey: "openai-key",
                        voice: "coral",
                        model: "gpt-4o-mini-tts",
                        baseUrl: "https://api.openai.com/v1",
                        instructions: "speak clearly",
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "openai-key",
                    base_url: "https://api.openai.com/v1",
                    model: "gpt-4o-mini-tts",
                    voice: "coral",
                    instructions: "speak clearly",
                });

                expect(new OpenAITTS({ voice: "coral" }).toConfig().params).toEqual({
                    voice: "coral",
                });

                expect(
                    new HumeAITTS({ key: "hume-key", voiceId: "voice", provider: "CUSTOM_VOICE" }).toConfig().params,
                ).toMatchObject({
                    key: "hume-key",
                    voice_id: "voice",
                    provider: "CUSTOM_VOICE",
                });

                expect(
                    new MiniMaxTTS({
                        key: "minimax-key",
                        groupId: "group",
                        model: "speech-02-turbo",
                        voiceId: "voice",
                        url: "wss://api-uw.minimax.io/ws/v1/t2a_v2",
                    }).toConfig().params,
                ).toMatchObject({
                    key: "minimax-key",
                    group_id: "group",
                    model: "speech-02-turbo",
                    voice_setting: { voice_id: "voice" },
                    url: "wss://api-uw.minimax.io/ws/v1/t2a_v2",
                });

                expect(
                    new MicrosoftTTS({ key: "ms-key", region: "eastus", voiceName: "en-US-JennyNeural" }).toConfig().params,
                ).toMatchObject({
                    key: "ms-key",
                    region: "eastus",
                    voice_name: "en-US-JennyNeural",
                });

                expect(
                    new SarvamTTS({
                        key: "sarvam-key",
                        speaker: "anushka",
                        targetLanguageCode: "en-IN",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    api_subscription_key: "sarvam-key",
                    speaker: "anushka",
                    target_language_code: "en-IN",
                    sample_rate: 24000,
                });

                expect(
                    new MurfTTS({
                        key: "murf-key",
                        voiceId: "Ariana",
                        baseUrl: "wss://murf.example/ws",
                        locale: "en-US",
                        rate: 0,
                        pitch: 0,
                        model: "FALCON",
                        sampleRate: 24000,
                    }).toConfig().params,
                ).toMatchObject({
                    api_key: "murf-key",
                    base_url: "wss://murf.example/ws",
                    voiceId: "Ariana",
                    locale: "en-US",
                    rate: 0,
                    pitch: 0,
                    model: "FALCON",
                    sample_rate: 24000,
                });

                expect(new MurfTTS({ key: "murf-key" }).toConfig().params).toEqual({
                    api_key: "murf-key",
                });
            });

            test("rejects invalid managed and BYOK TTS shapes at runtime", () => {
                expect(() => new OpenAITTS({ voice: "alloy", model: "tts-1-hd" } as never)).toThrow(
                    "OpenAITTS requires apiKey unless using the Agora-managed tts-1 model",
                );
                expect(() => new OpenAITTS({ apiKey: "openai-key", voice: "alloy", model: "tts-1-hd" } as never)).toThrow(
                    "OpenAITTS requires baseUrl",
                );
                expect(() => new MiniMaxTTS({ model: "unsupported-model" } as never)).toThrow(
                    "MiniMaxTTS requires key unless using a supported Agora-managed model",
                );
                expect(() => new MiniMaxTTS({ key: "minimax-key", model: "speech-02-turbo" } as never)).toThrow(
                    "MiniMaxTTS requires groupId",
                );
            });
        });
