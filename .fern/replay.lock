    patch_content: |+
      From 62db14d779158099cdbcc248ef509912a3f31c97 Mon Sep 17 00:00:00 2001
      From: digitallysavvy <hermes.frangoudis@gmail.com>
      Date: Wed, 27 May 2026 20:59:50 -0400
      Subject: [PATCH] Allow legacy package name references in migration docs during
       docs check. Permit agora-agent-server-sdk mentions in migration and rename
       context so installation guide copy passes the legacy package lint.

      ---
       scripts/docs-check.js | 11 ++++++++++-
       1 file changed, 10 insertions(+), 1 deletion(-)

      diff --git a/scripts/docs-check.js b/scripts/docs-check.js
      index 38278cf..20ac537 100644
      --- a/scripts/docs-check.js
      +++ b/scripts/docs-check.js
      @@ -12,6 +12,15 @@ const legacyPackagePatterns = [
         /\bagora-agent-server-sdk\b/,
       ];
       
      +function isAllowedLegacyPackageLine(line) {
      +  return (
      +    line.includes("compat/") ||
      +    /\bmigrat(?:e|ing|ion)\b/i.test(line) ||
      +    /previous package name/i.test(line) ||
      +    /renamed from/i.test(line)
      +  );
      +}
      +
       function walk(dir) {
         for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
           const fullPath = path.join(dir, entry.name);
      @@ -45,7 +54,7 @@ function checkFile(filePath) {
           const lines = text.split("\n");
           for (const pattern of legacyPackagePatterns) {
             for (const line of lines) {
      -        if (pattern.test(line) && !line.includes("compat/")) {
