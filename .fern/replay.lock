        /**
         * Constructor options for Google Gemini Live (direct API, non-Vertex AI).
         */
        export interface GeminiLiveOptions {
            /** Google API key */
            apiKey: string;
            /** Model name (e.g., 'gemini-live-2.5-flash') */
            model: string;
            /** WebSocket URL for real-time communication */
            url?: string;
