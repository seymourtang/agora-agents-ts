        # Installation

        ## Prerequisites

        - **Node.js 18 or later** — the SDK uses modern APIs (`fetch`, `AbortSignal`, `crypto`) that require Node 18+.
        - A package manager: npm, pnpm, or yarn.

        ## Install

        ```sh
        npm install agora-agents
        ```

        ```sh
        pnpm add agora-agents
        ```

        ```sh
        yarn add agora-agents
        ```

        ## Runtime compatibility

        | Runtime | Minimum version | Notes |
        |---|---|---|
        | Node.js | 18+ | Primary target |
        | Vercel | Supported | Serverless and Edge Functions |
        | Cloudflare Workers | Supported | Workers runtime |
        | Deno | 1.25+ | Via npm compatibility layer |
        | Bun | 1.0+ | Native Node compatibility |
        | React Native | Supported | Via polyfills if needed |

        ## Server-side only

        This SDK is designed for server-side use. Do not use it in a browser or expose it client-side — your App Certificate and Customer Secret must never be sent to the client. If you need a client-side integration, use the [Agora RTC SDK](https://docs.agora.io/en/video-calling/overview) for the media layer and call your own backend to manage agents.
      docs/getting-started/quick-start.md: |
        ---
        sidebar_position: 3
        title: Quick Start
        description: Build and run your first Agora Conversational AI agent in TypeScript with token auth and presets.
        ---

        # Quick Start

        This guide uses the recommended onboarding path:

        - `authToken` for REST API authentication
        - `preset` for Agora-managed ASR, LLM, and TTS
        - a channel join `token` for the RTC session
        - no vendor API keys in application code

        ## Full example

        ```typescript
        import { Agent, AgentPresets, AgoraClient, Area } from 'agora-agents';

        async function main(): Promise<void> {
          // Provision these in your backend. The SDK expects raw token values.
          const restAuthToken = process.env.AGORA_REST_AUTH_TOKEN!;
          const rtcJoinToken = process.env.AGORA_RTC_JOIN_TOKEN!;

          // Token auth for REST API calls.
          const client = new AgoraClient({
            area: Area.US,
            appId: 'your-app-id',
            appCertificate: 'your-app-certificate',
            authToken: restAuthToken,
          });

          // Agent-level behavior lives here. Vendor selection comes from presets below.
          const agent = new Agent({
            name: 'support-assistant',
            instructions: 'You are a concise support voice assistant.',
            greeting: 'Hello! How can I help you today?',
            maxHistory: 10,
          });

          const session = agent.createSession(client, {
            channel: 'support-room-123',
            agentUid: '1',
            remoteUids: ['100'],
            token: rtcJoinToken,
            idleTimeout: 120,
            preset: [
              AgentPresets.asr.deepgramNova3,
              AgentPresets.llm.openaiGpt5Mini,
              AgentPresets.tts.openaiTts1,
            ],
          });

          const agentSessionId = await session.start();
          console.log('Agent started:', agentSessionId);

          await session.say('Thanks for calling Agora support.');
          await session.stop();
        }

        void main();
        ```

        ## What this does

        1. `AgoraClient` uses `authToken` for REST API authentication.
        2. `Agent` holds reusable behavior such as instructions, greeting, and history settings.
        3. `preset` tells Agora which managed ASR, LLM, and TTS vendors to run.
        4. `token` on the session is the RTC join token used when the agent enters the channel.
        5. `session.start()` starts the agent and returns the unique agent session ID.

        ## When to use BYOK instead

        Use presets when you want the fastest path to a working agent.

        Use BYOK when you need to:

        - supply your own vendor API keys
        - use models outside the preset catalog
        - point at custom vendor endpoints
        - manage vendor-specific parameters directly

        See [BYOK Guide](../guides/byok.md).

        ## Next steps

        - [Authentication](./authentication.md)
        - [BYOK Guide](../guides/byok.md)
        - [MLLM Flow](../guides/mllm-flow.md)
        - [Agent Reference](../reference/agent.md)
      docs/guides/advanced.md: |
        ---
        sidebar_position: 8
        title: Advanced
        description: Headers, retries, timeouts, logging, and custom fetch client.
        ---

        # Advanced

        ## Additional Headers

        Send additional headers with the `headers` request option:

        ```typescript
        const response = await client.agents.start(..., {
          headers: { "X-Custom-Header": "custom value" },
        });
        ```

        ## Additional Query String Parameters

        Use the `queryParams` request option:

        ```typescript
        const response = await client.agents.start(..., {
          queryParams: { customQueryParamKey: "custom query param value" },
        });
        ```

        ## Retries

        The SDK retries automatically with exponential backoff. A request is retried when it returns:

        - **408** (Timeout)
        - **429** (Too Many Requests)
        - **5XX** (Internal Server Errors)

        Default retry limit: 2. Override with `maxRetries`:

        ```typescript
        const response = await client.agents.start(..., {
          maxRetries: 0,
        });
        ```

        ## Timeouts

        Default timeout: 60 seconds. Override with `timeoutInSeconds`:

        ```typescript
        const response = await client.agents.start(..., {
          timeoutInSeconds: 30,
        });
        ```

        ## Aborting Requests

        Pass an abort signal to cancel a request:

        ```typescript
        const controller = new AbortController();
        const response = await client.agents.start(..., {
          abortSignal: controller.signal,
        });
        controller.abort();
        ```

        ## Access Raw Response Data

        Use `.withRawResponse()` to get headers and raw response:

        ```typescript
        const { data, rawResponse } = await client.agents.start(...).withRawResponse();

        console.log(data);
        console.log(rawResponse.headers["X-My-Header"]);
        ```

        ## Logging

        Configure the logger via client options:

        ```typescript
        import { AgoraClient, logging } from "agora-agents";

        const client = new AgoraClient({
          area: Area.US,
          appId: "your-app-id",
          appCertificate: "your-app-certificate",
          authToken: "your-rest-auth-token",
          logging: {
            level: logging.LogLevel.Debug,
            logger: new logging.ConsoleLogger(),
            silent: false,
          },
        });
        ```

        Log levels: `Debug`, `Info`, `Warn`, `Error`.

        ### Custom logger

        Implement the `logging.ILogger` interface:

        ```typescript
        import winston from "winston";

        const winstonLogger = winston.createLogger({ ... });

        const logger: logging.ILogger = {
          debug: (msg, ...args) => winstonLogger.debug(msg, ...args),
          info: (msg, ...args) => winstonLogger.info(msg, ...args),
          warn: (msg, ...args) => winstonLogger.warn(msg, ...args),
          error: (msg, ...args) => winstonLogger.error(msg, ...args),
        };
        ```

        ## Runtime Compatibility

        The SDK works in:

        - Node.js 18+
        - Vercel
        - Cloudflare Workers
        - Deno v1.25+
        - Bun 1.0+
        - React Native

        ## Customizing Fetch Client

        Provide a custom `fetcher` for unsupported environments:

        ```typescript
        import { AgoraClient } from "agora-agents";

        const client = new AgoraClient({
          area: Area.US,
          appId: "your-app-id",
          appCertificate: "your-app-certificate",
          authToken: "your-rest-auth-token",
          fetcher: (url, init) => fetch(url, init), // your implementation
        });
        ```
