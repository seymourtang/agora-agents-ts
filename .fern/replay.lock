      .github/workflows/ci.yml: |
        name: ci

        on: [push]

        jobs:
          compile:
            runs-on: ubuntu-latest

            steps:
              - name: Checkout repo
                uses: actions/checkout@v4

              - name: Set up node
                uses: actions/setup-node@v4

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install

              - name: Compile
                run: pnpm build

          test:
            runs-on: ubuntu-latest

            steps:
              - name: Checkout repo
                uses: actions/checkout@v4

              - name: Set up node
                uses: actions/setup-node@v4
                        
              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install

              - name: Test
                run: pnpm test

          compat-build:
            runs-on: ubuntu-latest

            steps:
              - name: Checkout repo
                uses: actions/checkout@v4

              - name: Set up node
                uses: actions/setup-node@v4

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install

              - name: Build and verify compatibility shim
                run: |
                  pnpm build
                  cd compat/agora-agent-server-sdk
                  npm install --no-save file:../..
                  npm pack --dry-run
                  node verify-compat.js
      compat/agora-agent-server-sdk/verify-compat.js: |
        "use strict";

        const assert = require("node:assert/strict");
        const shim = require("./index.js");
        const root = require("agora-agents");

        assert.equal(shim.AgoraClient, root.AgoraClient);
        assert.equal(shim.Agent, root.Agent);

        console.log("Compat package re-exports verified.");
