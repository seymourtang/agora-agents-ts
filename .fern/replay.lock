    theirs_snapshot:
      .github/workflows/release.yml: |
        name: npm release

        on:
          push:
            tags:
              - "v*"
          workflow_dispatch:
            inputs:
              tag:
                description: "Existing tag to release, for example v1.4.0"
                required: true
                type: string

        permissions:
          contents: write
          id-token: write

        jobs:
          publish:
            runs-on: ubuntu-latest
            env:
              RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4
                with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

              - name: Set up node
                uses: actions/setup-node@v4
                with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
                  package-manager-cache: false

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Build
                run: pnpm build

              - name: Test
                run: pnpm test:unit && pnpm test:wire

              - name: Verify release tag
                run: |
                  TAG="${RELEASE_TAG}"
                  git rev-parse "$TAG" >/dev/null

              - name: Verify package versions match release tag
                run: |
                  TAG_VERSION="${RELEASE_TAG#v}"
                  ROOT_VERSION="$(node -p "require('./package.json').version")"
                  COMPAT_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').version")"
                  COMPAT_DEP_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').dependencies['agora-agents']")"

                  if [ "$ROOT_VERSION" != "$TAG_VERSION" ]; then
                    echo "Root package version ($ROOT_VERSION) does not match tag version ($TAG_VERSION)."
                    exit 1
                  fi

                  if [ "$COMPAT_VERSION" != "$TAG_VERSION" ]; then
                    echo "Compat package version ($COMPAT_VERSION) does not match tag version ($TAG_VERSION)."
                    exit 1
                  fi

                  if [ "$COMPAT_DEP_VERSION" != "^$TAG_VERSION" ]; then
                    echo "Compat package dependency on agora-agents ($COMPAT_DEP_VERSION) does not match ^$TAG_VERSION."
                    exit 1
                  fi

              - name: Publish primary package to npm
                run: |
                  PACKAGE_NAME="$(node -p "require('./package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
                    exit 0
                  fi

                  npm publish --access public

              - name: Wait for primary package on npm
                run: |
                  TAG_VERSION="${RELEASE_TAG#v}"
                  PACKAGE="agora-agents"
                  for attempt in $(seq 1 12); do
                    if npm view "${PACKAGE}@${TAG_VERSION}" version >/dev/null 2>&1; then
                      echo "${PACKAGE}@${TAG_VERSION} is available on npm."
                      exit 0
                    fi
                    echo "Waiting for ${PACKAGE}@${TAG_VERSION} on npm (attempt $attempt/12)..."
                    sleep 10
                  done
                  echo "Timed out waiting for ${PACKAGE}@${TAG_VERSION} on npm."
                  exit 1

              - name: Publish compatibility shim to npm
                run: |
                  PACKAGE_NAME="$(node -p "require('./compat/agora-agent-server-sdk/package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./compat/agora-agent-server-sdk/package.json').version")"

                  if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
                    exit 0
                  fi

                  cd compat/agora-agent-server-sdk
                  for attempt in $(seq 1 3); do
                    if npm publish --access public; then
                      exit 0
                    fi
                    echo "Compat publish failed (attempt $attempt/3). Retrying in 15s..."
                    sleep 15
                  done
                  exit 1

              - name: Extract release notes
                run: |
                  TAG="${RELEASE_TAG}"
                  git rev-parse "$TAG" >/dev/null
                  awk -v tag="$TAG" '
                    index($0, "## [" tag "]") == 1 { found = 1; next }
                    found && /^## \[/ { exit }
                    found { print }
                  ' changelog.md > release_notes.md

                  if [ ! -s release_notes.md ]; then
                    echo "Release $TAG" > release_notes.md
                  fi

              - name: Create or update GitHub release
                env:
                  GH_TOKEN: ${{ github.token }}
                run: |
                  TAG="${RELEASE_TAG}"
                  if gh release view "$TAG" >/dev/null 2>&1; then
                    gh release edit "$TAG" --title "$TAG" --notes-file release_notes.md
                  else
                    gh release create "$TAG" --title "$TAG" --notes-file release_notes.md
                  fi
