      From: plutoless <qianze.zhang@hotmail.com>
      Date: Fri, 22 May 2026 05:46:44 -0700
      Subject: [PATCH] ci: configure npm auth before publish

      ---
       .github/workflows/release.yml | 9 +++++++++
       1 file changed, 9 insertions(+)

      diff --git a/.github/workflows/release.yml b/.github/workflows/release.yml
      index e75f98b..b462a33 100644
      --- a/.github/workflows/release.yml
      +++ b/.github/workflows/release.yml
      @@ -49,10 +49,19 @@ jobs:
                 TAG="${RELEASE_TAG}"
                 git rev-parse "$TAG" >/dev/null
       
      +      - name: Verify npm auth
      +        env:
      +          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      +        run: |
      +          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
      +          npm whoami
      +
             - name: Publish to npm
               env:
                 NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
               run: |
      +          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
      +
                 PACKAGE_NAME="$(node -p "require('./package.json').name")"
                 PACKAGE_VERSION="$(node -p "require('./package.json').version")"
       
      -- 
      2.52.0

    theirs_snapshot:
      .github/workflows/release.yml: |
        name: npm release

        on:
          push:
            tags:
              - "v*"
          workflow_dispatch:
            inputs:
              tag:
                description: "Existing tag to release, for example v1.4.0"
                required: true
                type: string

        permissions:
          contents: read

        jobs:
          publish:
            runs-on: ubuntu-latest
            env:
              RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4
                with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

              - name: Set up node
                uses: actions/setup-node@v4
                with:
                  node-version: 20
                  registry-url: "https://registry.npmjs.org"

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Build
                run: pnpm build

              - name: Test
                run: pnpm test:unit

              - name: Verify release tag
                run: |
                  TAG="${RELEASE_TAG}"
                  git rev-parse "$TAG" >/dev/null

              - name: Verify npm auth
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                run: |
                  npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
                  npm whoami

              - name: Publish to npm
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                run: |
                  npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"

                  PACKAGE_NAME="$(node -p "require('./package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                    echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
                    exit 0
                  fi

                  pnpm publish --access public --no-git-checks
