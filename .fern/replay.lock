        /**
         * Token generation for internal use by the agentkit layer.
         *
         * - RTC tokens authenticate a specific (appId, channel, uid) combination with
         *   the Agora RTC network.
         * - ConvoAI tokens are combined RTC + RTM tokens used to authenticate ConvoAI
         *   REST API calls via `Authorization: agora token=<token>`.
         *
         * The `agora-token` library handles the JWT signing.
         */

        import agoraToken from "agora-token";

        const DEFAULT_EXPIRY_SECONDS = 86400;
        export const MAX_EXPIRY_SECONDS = 86400;

        /**
         * Convenience helpers for specifying token expiry durations.
         *
         * Agora AccessToken2 tokens are valid for a maximum of 24 hours (86400 seconds).
         * Use these helpers with `expiresIn` when creating sessions to avoid hardcoding
         * raw second values.
         *
         * @example
         * ```typescript
         * agent.createSession(client, {
         *   channel: 'room-123',
         *   agentUid: '1',
         *   remoteUids: ['100'],
         *   expiresIn: ExpiresIn.hours(12),
         * });
         * ```
         */
        export const ExpiresIn: {
            MAX: 86400;
            HOUR: 3600;
            DAY: 86400;
            hours(h: number): number;
            minutes(m: number): number;
            seconds(s: number): number;
        } = {
            /** Maximum token lifetime allowed by Agora (24 hours = 86400 seconds) */
            MAX: 86400,
            HOUR: 3600,
            DAY: 86400,

            /**
             * Convert hours to seconds. Throws if the value exceeds 24 hours.
             * @param h - Number of hours (must be > 0 and ≤ 24)
             */
            hours(h: number): number {
                const secs = h * 3600;
                return _validateExpiresIn(secs);
            },

            /**
             * Convert minutes to seconds. Throws if the value exceeds 24 hours.
             * @param m - Number of minutes (must be > 0 and ≤ 1440)
             */
            minutes(m: number): number {
                const secs = m * 60;
                return _validateExpiresIn(secs);
            },

            /**
             * Validate raw seconds. Throws if ≤ 0; warns and caps at 86400 if > 86400.
             * @param s - Number of seconds
             */
            seconds(s: number): number {
                return _validateExpiresIn(s);
            },
        };

        /**
         * Validates an `expiresIn` value in seconds.
         * - Throws if ≤ 0.
         * - Warns and caps at MAX_EXPIRY_SECONDS if > MAX_EXPIRY_SECONDS.
         */
        function _validateExpiresIn(secs: number): number {
            if (secs <= 0) {
                throw new Error("expiresIn must be between 1 and 86400 seconds (24h)");
            }
            if (secs > MAX_EXPIRY_SECONDS) {
                console.warn("agora-agents: expiresIn capped at 24h (Agora max)");
                return MAX_EXPIRY_SECONDS;
            }
            return secs;
        }

        export interface GenerateTokenOptions {
            appId: string;
            appCertificate: string;
            channel: string;
            uid: number;
            role?: number;
            expirySeconds?: number;
        }

        /**
         * Builds a short-lived RTC token for a numeric UID.
         *
         * Both `tokenExpire` and `privilegeExpire` are set to the same value — the
         * standard approach for most applications.
         */
        export function generateRtcToken(opts: GenerateTokenOptions): string {
            const expiry = opts.expirySeconds ?? DEFAULT_EXPIRY_SECONDS;
            return agoraToken.RtcTokenBuilder.buildTokenWithUid(
                opts.appId,
                opts.appCertificate,
                opts.channel,
                opts.uid,
                opts.role ?? agoraToken.RtcRole.PUBLISHER,
                expiry,
                expiry,
            );
        }

        export interface GenerateRtcTokenWithAccountOptions {
            appId: string;
            appCertificate: string;
            channel: string;
            /** String account identity — used when enableStringUid is true */
            account: string;
            role?: number;
            expirySeconds?: number;
        }

        /**
         * Builds a short-lived RTC token for a string UID (user account).
         *
         * Use this instead of `generateRtcToken` when `enableStringUid` is true and
         * the agent UID is a non-numeric string. The Agora platform treats
         * `buildTokenWithUserAccount` tokens as valid for string-UID channels.
         *
         * Both `tokenExpire` and `privilegeExpire` are set to the same value.
         */
        export function generateRtcTokenWithAccount(opts: GenerateRtcTokenWithAccountOptions): string {
            const expiry = opts.expirySeconds ?? DEFAULT_EXPIRY_SECONDS;
            return agoraToken.RtcTokenBuilder.buildTokenWithUserAccount(
                opts.appId,
                opts.appCertificate,
                opts.channel,
                opts.account,
                opts.role ?? agoraToken.RtcRole.PUBLISHER,
                expiry,
                expiry,
            );
        }

        export interface GenerateConvoAITokenOptions {
            appId: string;
            appCertificate: string;
            /** The channel the agent will join — must match the channel used in the start request */
            channelName: string;
            /** Numeric ConvoAI participant UID. Use the RTC UID for a user, agent, or avatar. */
            uid: number;
            /** Seconds until the token expires (default: 86400) */
            tokenExpire?: number;
            /**
             * Seconds until privileges expire. Defaults to the same value as `tokenExpire`.
             * Per Agora docs, setting this to 0 would expire privileges immediately — the SDK
             * always substitutes `tokenExpire` when this is 0 or omitted.
             */
            privilegeExpire?: number;
        }

        /**
         * Builds a combined RTC + RTM token for ConvoAI REST API authentication.
         *
         * The resulting token is used as: `Authorization: agora token=<token>`
         *
         * Uses `buildTokenWithRtm` which bundles both RTC channel access and RTM
         * messaging privileges in a single AccessToken2 token.
         */
        export function generateConvoAIToken(opts: GenerateConvoAITokenOptions): string {
            const tokenExpire = opts.tokenExpire ?? DEFAULT_EXPIRY_SECONDS;
            // Per Agora docs, privilegeExpire=0 means "expires immediately", which is invalid.
            // When omitted or 0, use the same value as tokenExpire.
            const configuredPrivilegeExpire = opts.privilegeExpire ?? 0;
            const privilegeExpire = configuredPrivilegeExpire === 0 ? tokenExpire : configuredPrivilegeExpire;
            const account = _uidToAccount(opts.uid);
            return agoraToken.RtcTokenBuilder.buildTokenWithRtm(
                opts.appId,
                opts.appCertificate,
                opts.channelName,
                account,
                agoraToken.RtcRole.PUBLISHER,
                tokenExpire,
                privilegeExpire,
            );
        }

        function _uidToAccount(uid: number): string {
            if (!Number.isInteger(uid)) {
                throw new Error("uid must be an integer when provided as a number");
            }
            return String(uid);
        }
      src/agentkit/vendors/avatar.ts: |
        /**
         * Type-safe Avatar vendor classes.
         *
         * Avatar vendors provide visual representation for voice agents.
         * Different vendors have specific audio sample rate requirements.
         */

        import type { AvatarConfig } from '../types.js';
        import type { AkoolSampleRate, HeyGenSampleRate, LiveAvatarSampleRate } from './base.js';
        import { BaseAvatar } from './base.js';

        /**
         * Constructor options for LiveAvatar.
         */
        export interface LiveAvatarAvatarOptions {
          /** LiveAvatar API key */
          apiKey: string;
          /** Video quality: "low" (360p), "medium" (480p), or "high" (720p) */
          quality: 'low' | 'medium' | 'high';
          /** RTC UID for the avatar (must be unique in the channel) */
          agoraUid: string;
          /** Avatar ConvoAI token. Omit to auto-generate at session start. */
          agoraToken?: string;
          /** Avatar ID */
          avatarId?: string;
          /** Whether to disable idle timeout (default: false) */
          disableIdleTimeout?: boolean;
          /** Idle timeout in seconds (default: 120, only applies if disableIdleTimeout is false) */
          activityIdleTimeout?: number;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Constructor options for Akool Avatar.
         */
        export interface AkoolAvatarOptions {
          /** Akool API key */
          apiKey: string;
          /** Akool avatar ID */
          avatarId?: string;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Akool Avatar vendor.
         *
         * ⚠️ IMPORTANT: Akool avatars ONLY support audio with a sample rate of 16,000 Hz.
         * You must configure your TTS with a 16kHz sample rate or the request will fail.
         *
         * @example
         * ```typescript
         * import { Agent, AkoolAvatar, ElevenLabsTTS } from 'agora-agents';
         *
         * const avatar = new AkoolAvatar({
         *   apiKey: process.env.AKOOL_API_KEY,
         *   avatarId: 'avatar-id',
         * });
         *
         * // TTS must declare sampleRate: 16000 so withAvatar() enforces the match at compile time.
         * const tts = new ElevenLabsTTS({
         *   key: process.env.ELEVENLABS_API_KEY,
         *   modelId: 'eleven_flash_v2_5',
         *   voiceId: 'voice-id',
         *   sampleRate: 16000, // Required for Akool
         * });
         *
         * const agent = new Agent({ name: 'avatar-assistant' })
         *   .withTts(tts)
         *   .withAvatar(avatar);
         * ```
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/akool
         */
        export class AkoolAvatar extends BaseAvatar<AkoolSampleRate> {
          private readonly options: AkoolAvatarOptions;

          /**
           * Akool avatars require TTS sample rate of 16,000 Hz.
           */
          readonly requiredSampleRate = 16000 as const;

          constructor(options: AkoolAvatarOptions) {
            super();
            this.options = options;

            // Defense-in-depth check for JavaScript callers that bypass TypeScript types.
            // See HeyGenAvatar constructor for the two-layer validation rationale.
            if (!options.apiKey) {
              throw new Error('Akool avatar requires apiKey');
            }
          }

          toConfig(): AvatarConfig {
            const { apiKey, avatarId, enable = true, additionalParams } = this.options;

            return {
              enable,
              vendor: 'akool',
              params: {
                // additionalParams spread first so that explicit fields always win.
                ...additionalParams,
                api_key: apiKey,
                ...(avatarId && { avatar_id: avatarId }),
              },
            };
          }
        }

        // =============================================================================
        // LiveAvatar (formerly HeyGen)
        // =============================================================================

        /**
         * LiveAvatar avatar vendor (formerly HeyGen).
         *
         * ⚠️ IMPORTANT: LiveAvatar ONLY supports audio with a sample rate of 24,000 Hz.
         * You must configure your TTS with a 24kHz sample rate or the request will fail.
         *
         * @example
         * ```typescript
         * import { Agent, LiveAvatarAvatar, ElevenLabsTTS } from 'agora-agents';
         *
         * const avatar = new LiveAvatarAvatar({
         *   apiKey: process.env.LIVEAVATAR_API_KEY,
         *   quality: 'high',
         *   agoraUid: '12345',
         *   avatarId: 'avatar-id',
         * });
         *
         * const tts = new ElevenLabsTTS({
         *   apiKey: process.env.ELEVENLABS_API_KEY,
         *   modelId: 'eleven_flash_v2_5',
         *   voiceId: 'voice-id',
         *   sampleRate: 24000, // Required for LiveAvatar
         * });
         *
         * const agent = new Agent({ name: 'avatar-assistant' })
         *   .withTts(tts)
         *   .withAvatar(avatar);
         * ```
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/overview
         */
        export class LiveAvatarAvatar extends BaseAvatar<LiveAvatarSampleRate> {
          private readonly options: LiveAvatarAvatarOptions;

          /**
           * LiveAvatar requires TTS sample rate of 24,000 Hz.
           */
          readonly requiredSampleRate = 24000 as const;

          constructor(options: LiveAvatarAvatarOptions) {
            super();
            this.options = options;

            if (!options.apiKey) {
              throw new Error('LiveAvatar requires apiKey');
            }
            if (!options.agoraUid) {
              throw new Error('LiveAvatar requires agoraUid');
            }
          }

          toConfig(): AvatarConfig {
            const {
              apiKey,
              quality,
              agoraUid,
              agoraToken,
              avatarId,
              disableIdleTimeout,
              activityIdleTimeout,
              enable = true,
              additionalParams,
            } = this.options;

            return {
              enable,
              vendor: 'liveavatar',
              params: {
                ...additionalParams,
                api_key: apiKey,
                quality,
                agora_uid: agoraUid,
                ...(agoraToken && { agora_token: agoraToken }),
                ...(avatarId && { avatar_id: avatarId }),
                ...(disableIdleTimeout !== undefined && {
                  disable_idle_timeout: disableIdleTimeout,
                }),
                ...(activityIdleTimeout !== undefined && {
                  activity_idle_timeout: activityIdleTimeout,
                }),
              },
            };
          }
        }

        /**
         * @deprecated HeyGen has been renamed to LiveAvatar. Use {@link LiveAvatarAvatarOptions} instead.
         */
        export type HeyGenAvatarOptions = LiveAvatarAvatarOptions;

        /**
         * HeyGen Avatar vendor.
         *
         * @deprecated HeyGen has been renamed to LiveAvatar. Use {@link LiveAvatarAvatar} instead.
         * This class emits `vendor: "heygen"` for backward compatibility. New deployments
         * should use `LiveAvatarAvatar` which emits `vendor: "liveavatar"`.
         */
        export class HeyGenAvatar extends BaseAvatar<HeyGenSampleRate> {
          private readonly options: HeyGenAvatarOptions;

          readonly requiredSampleRate = 24000 as const;

          constructor(options: HeyGenAvatarOptions) {
            super();
            this.options = options;
            if (!options.apiKey) {
              throw new Error('HeyGen avatar requires apiKey');
            }
            if (!options.agoraUid) {
              throw new Error('HeyGen avatar requires agoraUid');
            }
          }

          toConfig(): AvatarConfig {
            const {
              apiKey,
              quality,
              agoraUid,
              agoraToken,
              avatarId,
              disableIdleTimeout,
              activityIdleTimeout,
              enable = true,
              additionalParams,
            } = this.options;

            return {
              enable,
              vendor: 'heygen',
              params: {
                ...additionalParams,
                api_key: apiKey,
                quality,
                agora_uid: agoraUid,
                ...(agoraToken && { agora_token: agoraToken }),
                ...(avatarId && { avatar_id: avatarId }),
                ...(disableIdleTimeout !== undefined && {
                  disable_idle_timeout: disableIdleTimeout,
                }),
                ...(activityIdleTimeout !== undefined && {
                  activity_idle_timeout: activityIdleTimeout,
                }),
              },
            };
          }
        }

        // =============================================================================
        // Anam
        // =============================================================================

        /**
         * Constructor options for Anam Avatar.
         */
        export interface AnamAvatarOptions {
          /** Anam API key */
          apiKey: string;
          /** Anam persona ID */
          personaId?: string;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Anam Avatar vendor (Beta).
         *
         * @example
         * ```typescript
         * import { Agent, AnamAvatar } from 'agora-agents';
         *
         * const avatar = new AnamAvatar({
         *   apiKey: process.env.ANAM_API_KEY,
         *   personaId: 'persona-id',
         * });
         *
         * const agent = new Agent({ name: 'avatar-assistant' })
         *   .withAvatar(avatar);
         * ```
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/overview
         */
        export class AnamAvatar extends BaseAvatar<number> {
          private readonly options: AnamAvatarOptions;

          /**
           * Anam does not enforce a specific TTS sample rate. Consult Anam documentation
           * for the sample rate supported by your chosen persona.
           */
          readonly requiredSampleRate = 0 as number;

          constructor(options: AnamAvatarOptions) {
            super();
            this.options = options;

            if (!options.apiKey) {
              throw new Error('Anam avatar requires apiKey');
            }
          }

          toConfig(): AvatarConfig {
            const { apiKey, personaId, enable = true, additionalParams } = this.options;

            return {
              enable,
              vendor: 'anam',
              params: {
                ...additionalParams,
                api_key: apiKey,
                ...(personaId && { persona_id: personaId }),
              },
            };
          }
        }

        // =============================================================================
        // Generic
        // =============================================================================

        /**
         * Constructor options for Generic Avatar.
         */
        export interface GenericAvatarOptions {
          /** Avatar provider API key */
          apiKey: string;
          /** Avatar provider API base URL */
          apiBaseUrl: string;
          /** Avatar ID */
          avatarId: string;
          /** RTC UID for the avatar video publisher (must be unique in the channel) */
          agoraUid: string;
          /** Agora App ID. Omit to use the session app ID at start. */
          agoraAppId?: string;
          /** Agora channel. Omit to use the session channel at start. */
          agoraChannel?: string;
          /** Avatar ConvoAI token. Omit to auto-generate at session start. */
          agoraToken?: string;
          /** Enable avatar (default: true) */
          enable?: boolean;
          /** Additional vendor-specific parameters */
          additionalParams?: Record<string, unknown>;
        }

        /**
         * Generic Avatar vendor (Beta).
         *
         * Generic avatars use a custom avatar provider while still publishing video
         * into the Agora channel. AgentKit fills `agora_appid`, `agora_channel`, and
         * `agora_token` at session start when they are omitted.
         *
         * @see https://docs.agora.io/en/conversational-ai/models/avatar/generic
         */
        export class GenericAvatar extends BaseAvatar<number> {
          private readonly options: GenericAvatarOptions;

          /**
           * Generic avatars do not enforce a specific TTS sample rate.
           */
          readonly requiredSampleRate = 0 as number;

          constructor(options: GenericAvatarOptions) {
            super();
            this.options = options;

            if (!options.apiKey) {
              throw new Error('Generic avatar requires apiKey');
            }
            if (!options.apiBaseUrl) {
              throw new Error('Generic avatar requires apiBaseUrl');
            }
            if (!options.avatarId) {
              throw new Error('Generic avatar requires avatarId');
            }
            if (!options.agoraUid) {
              throw new Error('Generic avatar requires agoraUid');
            }
          }

          toConfig(): AvatarConfig {
            const {
              apiKey,
              apiBaseUrl,
              avatarId,
              agoraUid,
              agoraAppId,
              agoraChannel,
              agoraToken,
              enable = true,
              additionalParams,
            } = this.options;

            return {
              enable,
              vendor: 'generic',
              params: {
                ...additionalParams,
                api_key: apiKey,
                api_base_url: apiBaseUrl,
                avatar_id: avatarId,
                agora_uid: agoraUid,
                ...(agoraAppId && { agora_appid: agoraAppId }),
                ...(agoraChannel && { agora_channel: agoraChannel }),
                ...(agoraToken && { agora_token: agoraToken }),
              },
            };
          }
        }
