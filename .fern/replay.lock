        export interface SarvamAsrParams {
            /** Sarvam API key */
            api_key: string;
            /** Language code (e.g., 'en', 'hi', 'ta') */
            language?: string;
            /** Additional Sarvam-specific parameters */
            [key: string]: unknown;
