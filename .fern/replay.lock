         *     voice: 'Aoede',
         *     greetingMessage: 'Hello! Gemini is listening.',
         *   }));
         * ```
         */
        export class VertexAI extends BaseMLLM {
            private readonly options: VertexAIOptions;

            constructor(options: VertexAIOptions) {
                super();
                this.options = options;
            }

            toConfig(): MllmConfig {
