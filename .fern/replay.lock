        ## TTS vendors

        ### ElevenLabsTTS

        <!-- snippet: fragment -->
        ```typescript
        new ElevenLabsTTS<SR extends ElevenLabsSampleRate>(options: ElevenLabsTTSOptions<SR>)
        ```

        | Option | Type | Required | Description |
