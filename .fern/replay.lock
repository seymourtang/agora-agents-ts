      Date: Thu, 21 May 2026 16:15:47 -0400
      Subject: [PATCH] updated tests

      ---
       tests/agentkit/parity.test.ts | 724 ----------------------------------
       1 file changed, 724 deletions(-)
       delete mode 100644 tests/agentkit/parity.test.ts

      diff --git a/tests/agentkit/parity.test.ts b/tests/agentkit/parity.test.ts
      deleted file mode 100644
      index afdf781..0000000
      --- a/tests/agentkit/parity.test.ts
      +++ /dev/null
      @@ -1,724 +0,0 @@
      -import { describe, expect, test, vi } from "vitest";
      -import { GeminiLive, VertexAI } from "../../src/agentkit/vendors/mllm";
      -import type { InterruptionConfig } from "../../src/index";
      -import {
      -    Agent,
      -    AkoolAvatar,
